title: Remote Services Lateral Movement
id: suru-lm-001
status: production
description: Detects suspicious use of remote services for lateral movement
# MITRE ATT&CK: TA0008 Lateral Movement / T1021 Remote Services
references:
  - https://attack.mitre.org/techniques/T1021/
author: SURU Detection Engineering
date: 2026/01/01
tags:
  - attack.t1021
  - attack.ta0008
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|endswith:
      - '/ssh'
      - '/scp'
      - '/rsync'
    CommandLine|contains:
      - '-o StrictHostKeyChecking=no'
      - 'ProxyJump'
  condition: selection
falsepositives:
  - Automated deployment pipelines (allowlist in tuning/)
level: medium
