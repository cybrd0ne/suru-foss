# SURU Platform — Suricata alert rate-limiting and suppression thresholds
# Reference: https://docs.suricata.io/en/latest/configuration/threshold-config.html
# SOURCE OF TRUTH: tier2-telemetry/suricata/thresholds/
#
# Threshold format:
#   threshold gen_id 1, sig_id <sid>, type <limit|threshold|both>, track by_src|by_dst, count N, seconds T
#   suppress gen_id 1, sig_id <sid>[, track by_src, ip <addr>]
#   rate_filter gen_id 1, sig_id <sid>, track by_src, count N, seconds T, new_action <pass|alert|drop>, timeout T

# ── SURU custom rule thresholds (SID block 9990000-9999999) ──────────────────

# 9990001 — HTTP C2 beacon: escalate to drop after 3rd alert per source per hour.
# The detection_filter in the rule fires only after 20 events in 60s; this
# rate_filter escalates a confirmed repeat offender. new_action drop requires
# IPS inline mode; in passive IDS mode this is a no-op and Suricata logs alert.
rate_filter gen_id 1, sig_id 9990001, track by_src, count 3, seconds 3600, new_action drop, timeout 3600

# 9990002 — DNS tunnel: escalate to drop after 2nd alert per source per 10 min.
# Lower threshold than HTTP — DNS tunnel implants have fewer legitimate FP scenarios.
rate_filter gen_id 1, sig_id 9990002, track by_src, count 2, seconds 600, new_action drop, timeout 600

# ── ET Open noise suppressions ────────────────────────────────────────────────

# 2019284 — ET SCAN Potential SSH Scan: suppress after 5 events from same source
# in 60s. This SID is already in disable.conf; entry retained as a template for
# re-enabling or for similar high-volume SIDs. Activate by removing the leading '#'.
# threshold gen_id 1, sig_id 2019284, type threshold, track by_src, count 5, seconds 60
