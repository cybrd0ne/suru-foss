# SURU Platform — Suricata rule disable list (SOHO profile)
# High false-positive categories for residential/SOHO networks.
# Validation: suricata-update --config update-policy/update.yaml --no-test (dry preview)
#
# SOURCE OF TRUTH: tier2-telemetry/suricata/rule-selection/
# Consumed by: tier2-telemetry/build/lib/render-suricata.sh
# Output to:   tier1-perimeter/rendered/<platform>/suricata/disable.conf

# Policy rules — chatty, high FP in SOHO
group:emerging-policy

# Info category — too noisy
group:emerging-info

# Games category — residential false positives
group:emerging-games

# SCADA/ICS — not present in SOHO
group:emerging-scada
group:emerging-dnp3

# Inappropriate content — content-policy, not security-relevant; high volume
group:emerging-inappropriate

# ActiveX — legacy browser tech, effectively obsolete
group:emerging-activex

# P2P — blocks legitimate BitTorrent and gaming; very noisy on home networks
group:emerging-p2p

# TFTP — port 69 already handled by firewall deny-all; Suricata overhead not needed
group:emerging-tftp

# NetBIOS — very high false-positive rate on Windows LANs with normal traffic
group:emerging-netbios

# Chat — Teams, Slack, Discord generate constant false positives
group:emerging-chat

# Suricata distribution app-layer events — protocols not enabled
# in our suricata.yaml. Failing as of Suricata 7.0.11.
# dnp3-events.rules
2270000
2270001
2270002
2270003
2270004
