# SURU Platform — Suricata rule explicit enable list
# Re-enable specific SIDs from disabled groups when confirmed relevant.
# MITRE ATT&CK annotations per rule.
#
# SOURCE OF TRUTH: tier2-telemetry/suricata/rule-selection/
# Consumed by: tier2-telemetry/build/lib/render-suricata.sh
# Output to:   tier1-perimeter/rendered/<platform>/suricata/enable.conf

# ============================================================
# Tier 1 — CRITICAL
# These categories are mandatory for the SOHO perimeter detection
# baseline. Do NOT move them to disable.conf without explicit
# approval — they cover the core kill-chain stages.
# ============================================================

# Botnet C2 — emerging-botcc.rules
# MITRE ATT&CK: TA0011 (Command and Control)
# Blocks active C2 infrastructure (Emotet, TrickBot, Cobalt Strike,
# QakBot); updated hourly via Abuse.ch feeds.
group:emerging-botcc

# Malware — emerging-malware.rules
# MITRE ATT&CK: TA0001 (Initial Access), TA0011 (Command and Control)
# Payload delivery, RAT beacons, dropper traffic.
# Highest value/noise ratio of any ET Open category.
group:emerging-malware

# Exploit — emerging-exploit.rules
# MITRE ATT&CK: TA0001 (Initial Access)
# Router firmware exploits, browser exploits, vulnerability probing.
group:emerging-exploit

# Attack Response — emerging-attack_response.rules
# MITRE ATT&CK: TA0040 (Impact)
# Post-exploitation indicators: shell banners, Meterpreter,
# root-response strings. Catches successful attacks, not just attempts.
group:emerging-attack_response

# DNS — emerging-dns.rules
# MITRE ATT&CK: TA0010 (Exfiltration), TA0011 (Command and Control)
# DNS tunneling, DGA domains, C2 over DNS — critical for SOHO.
# Pairs with Zeek DNS logs for cross-correlation.
group:emerging-dns

# Trojan — emerging-trojan.rules
# MITRE ATT&CK: TA0011 (Command and Control)
# Trojan beaconing and exfiltration patterns.
group:emerging-trojan

# ============================================================
# Tier 2 — HIGH VALUE
# Second-tier detection categories. Enabled by default; demote to
# disable.conf only with documented rationale (e.g., confirmed
# excessive FP rate on this specific network).
# ============================================================

# Scan — emerging-scan.rules
# MITRE ATT&CK: TA0043 (Reconnaissance)
# Port scans and network sweeps. Complements Zeek passive detection
# for active recon attempts.
group:emerging-scan

# Phishing — emerging-phishing.rules
# MITRE ATT&CK: TA0001 (Initial Access)
# Phishing URL patterns. High relevance for non-expert SOHO users.
group:emerging-phishing

# Current Events — emerging-current_events.rules
# MITRE ATT&CK: multiple (rotates with active campaigns)
# Active campaigns — tracks current threat waves (ransomware drops,
# mass exploits). Content changes frequently; ET Open updates daily.
group:emerging-current_events

# Mobile Malware — emerging-mobile_malware.rules
# MITRE ATT&CK: TA0011 (Command and Control)
# IoT / Android botnet traffic. Very relevant for SOHO networks with
# smart devices (cameras, doorbells, smart speakers).
group:emerging-mobile_malware

# TOR — emerging-tor.rules
# MITRE ATT&CK: TA0011 (Command and Control)
# C2 over TOR circuits — detects anonymized C2 sessions.
group:emerging-tor

# FTP — emerging-ftp.rules
# MITRE ATT&CK: TA0006 (Credential Access)
# FTP brute force and abuse — common on exposed NAS/routers.
group:emerging-ftp

# SMTP — emerging-smtp.rules
# MITRE ATT&CK: TA0010 (Exfiltration)
# Spam relay detection — catches compromised devices acting as spam bots.
group:emerging-smtp

# ============================================================
# Tier 3 — CONTEXTUAL
# Disabled by default. Uncomment the group: line when the
# described service or device type is present on this network.
# Do NOT enable globally — each category is service-specific
# and will generate high FP noise on networks without that service.
# ============================================================

# Web Server — emerging-web_server.rules
# MITRE ATT&CK: TA0001 (Initial Access) / T1190 (Exploit Public-Facing App)
# When to enable: self-hosting a web app, NAS with web UI, or any
# HTTP service reachable from the WAN or guest segment.
# group:emerging-web_server

# SQL — emerging-sql.rules
# MITRE ATT&CK: TA0006 (Credential Access) / T1190 (SQL Injection)
# When to enable: running a local database server (MySQL, PostgreSQL,
# SQLite-backed app) or any web app with a DB backend.
# group:emerging-sql

# SNMP — emerging-snmp.rules
# MITRE ATT&CK: TA0007 (Discovery) / T1046 (Network Service Scanning)
# When to enable: SNMP is active on internal network devices
# (managed switches, UPS, NMS polling).
# group:emerging-snmp

# VoIP — emerging-voip.rules
# MITRE ATT&CK: TA0010 (Exfiltration) / T1071 (Application Layer Protocol)
# When to enable: SIP/VoIP devices present (IP phones, ATA adapters,
# softphones, PBX systems).
# group:emerging-voip

# User Agents — emerging-user_agents.rules
# MITRE ATT&CK: TA0001 (Initial Access) / T1071.001 (Web Protocols)
# When to enable: selectively — catches malicious or anomalous HTTP
# user-agent strings (exploit kits, scanners, C2 frameworks).
# High FP risk on networks with legacy or embedded HTTP clients.
# group:emerging-user_agents

# ============================================================
# Per-SID enables — re-enable individual rules from disabled groups
# when confirmed relevant. Add a MITRE ATT&CK comment per entry, e.g.:
#   # T1071.004 — DNS-based C2 — re-enabled <date>: <why it's relevant + FP note>
#   2027758
# (The previous 2027758 / 2024897 entries were commented-out placeholders with
# no enable rationale and were removed — SEC-047. Add specific SIDs here only
# with a documented reason and an FP assessment.)
# ============================================================
