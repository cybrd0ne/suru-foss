# SURU Platform — Sigma Rule: DNS Tunneling / C2 over DNS
# MITRE ATT&CK: TA0011 Command and Control / T1071.004
# Correlates with: Zeek suru-dns-entropy.zeek notice.log entries
# Validation: sigma check suru-c2-dns-tunneling.yml
title: SURU - DNS Tunneling (High Entropy Subdomain)
id: 7b4e3f2a-0002-4c6d-9e0f-b2c3d4e5f6a7
status: experimental
description: |
  Detects DNS queries with high-entropy subdomains indicative of DNS tunneling
  or C2 over DNS. Source: Zeek notice.log (SURU_DNS::DNS_High_Entropy_Query).
author: SURU Platform
date: 2026-05-01
tags:
  - attack.command_and_control
  - attack.t1071.004
logsource:
  product: zeek
  service: notice
detection:
  selection:
    event.dataset: zeek.notice
    zeek.notice.note: SURU_DNS::DNS_High_Entropy_Query
  condition: selection
falsepositives:
  - DNSSEC signed zones with long labels
  - Legitimate CDN domains with hash-encoded subdomains
level: high
