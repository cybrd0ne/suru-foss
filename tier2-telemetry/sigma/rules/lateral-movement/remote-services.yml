# Migrated from (retired): sigma-rules/lateral-movement/t1021-remote-services.yaml
title: SURU - Remote Services Lateral Movement (STUB — no live ECS source)
id: suru-lm-001
status: experimental
description: |
  Detects suspicious use of remote-access binaries (ssh/scp/rsync) for
  lateral movement via process-creation telemetry. STUB: no endpoint/EDR
  telemetry is ingested into this deployment's OpenSearch cluster today, and
  suru-ecs-template.json has no process.command_line/process.executable
  mapping to bind this rule's `Image`/`CommandLine` fields to. This rule
  cannot fire until an endpoint data source is added (see T1c stub scaffold,
  tier2-telemetry/opensearch/field-mappings/suru_endpoint.yml).
references:
  - https://attack.mitre.org/techniques/T1021/
author: SURU Detection Engineering
date: 2026/01/01
modified: 2026/06/24
tags:
  - attack.ta0008
  - attack.t1021
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|endswith:
      - '/ssh'
      - '/scp'
      - '/rsync'
    CommandLine|contains:
      - '-o StrictHostKeyChecking=no'
      - 'ProxyJump'
  condition: selection
falsepositives:
  - Automated deployment pipelines (allowlist in tuning/)
level: medium
