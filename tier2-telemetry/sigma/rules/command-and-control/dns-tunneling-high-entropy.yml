# SURU Platform — Sigma Rule: DNS Tunneling / C2 over DNS
# MITRE ATT&CK: TA0011 Command and Control / T1071.004 (Application Layer
# Protocol: DNS)
# Source: Zeek notice.log, normalized to ECS v8 by the tier3 Zeek pipeline.
# Correlates with: zeek/scripts/suru-dns-entropy.zeek (raises
#   SURU_DNS::DNS_High_Entropy_Query via the Notice framework).
# Validation: sigma check dns-tunneling-high-entropy.yml
# Migrated from (retired): sigma/rules/suru-c2-dns-tunneling.yml. The prior
# rule keyed on `zeek.notice.note`, which does not exist in
# suru-ecs-template.json (only zeek.uid/zeek.file_source are mapped under
# `zeek.*`). Per `tier2-telemetry/opensearch/field-mappings/README.md`, Zeek notice.log's
# notice type lands in `rule.name` and is only an alert-kind event
# (event.kind:"alert") when event.dataset:"notice".
title: SURU - DNS Tunneling (High Entropy Subdomain)
id: 7b4e3f2a-0002-4c6d-9e0f-b2c3d4e5f6a7
status: experimental
description: |
  Detects DNS queries with high-entropy subdomains indicative of DNS
  tunneling or C2 over DNS, raised by the SURU custom Zeek detection script
  (suru-dns-entropy.zeek) via the Notice framework and surfaced in ECS as
  event.dataset:"notice" with rule.name = SURU_DNS::DNS_High_Entropy_Query.
author: SURU Platform / SURU Detection Engineering
date: 2026/05/01
modified: 2026/06/24
tags:
  - attack.ta0011
  - attack.t1071.004
logsource:
  category: notice
  product: zeek
detection:
  selection:
    event.dataset: notice
    event.kind: alert
    rule.name: 'SURU_DNS::DNS_High_Entropy_Query'
  condition: selection
falsepositives:
  - DNSSEC signed zones with long labels
  - Legitimate CDN domains with hash-encoded subdomains
level: high
