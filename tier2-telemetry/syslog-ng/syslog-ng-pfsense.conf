# =============================================================================
# [STUB: SEC-016] This file has known bugs that make it non-functional.
# DO NOT DEPLOY. A correct tier2 syslog-ng config is a future deliverable.
#
# The authoritative tier1 syslog-ng template (use as a reference pattern):
#   tier1-perimeter/templates/pfsense/syslog-ng.conf.tpl
# Deployed by: make deploy (tier1-perimeter/)
#
# Known bugs in the retired config (SEC-016):
#   (a) JSON templates t_json_base/t_json_file defined but never applied
#       to d_logstash_tls — ships default plain syslog, breaking the
#       _suru.log_type routing contract in Logstash.
#   (b) Destination targets port 5044 (Beats) with raw network() TCP —
#       protocol mismatch; Logstash Beats input rejects non-Beats traffic.
#   (c) unix-dgram("/var/run/log") re-introduces the documented syslogd
#       socket-competition bug AND lacks flags(syslog-protocol), so every
#       program() filter matches nothing.
#   (d) No flags(final) on log paths — every event double-ships to Logstash.
#   (e) d_local_fallback writes to an uncapped file, risking disk exhaustion.
#   (f) TLS 1.3 cipher suite names in cipher-suite() (a TLS ≤1.2 directive) —
#       cipher negotiation is undefined/silently ignored.
#
# A proper tier2 syslog-ng config for a standalone mini-PC sensor must use:
#   mTLS destination on port 443 with sni(yes) (frontdoor SNI passthrough),
#   reliable disk-buffer(), file() sources with program-override() and
#   flags(syslog-protocol), flags(final) on every log path, and
#   template(t_json_base) on the destination.
# =============================================================================
