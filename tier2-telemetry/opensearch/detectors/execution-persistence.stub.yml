name: execution-persistence-stub
status: stub
buildable: false
owner_tier: tier2-telemetry
field_mapping_ref: tier2-telemetry/opensearch/field-mappings/suru_endpoint.yml
index_pattern: suru-endpoint-*   # PLACEHOLDER — unconfirmed naming, no live index exists
log_type: suru_endpoint

mitre:
  tactics:
    - id: TA0002
      name: Execution
    - id: TA0003
      name: Persistence

# Skeleton technique entries — each is a future Layer-1 Sigma rule binding target,
# not a working detector. `sigma_rule_ref` paths are PLACEHOLDERS (files do not
# exist yet); `selection_sketch` is illustrative only, not a real Sigma `detection:`
# block, and has NOT been run through `sigma check`.
techniques:
  - id: T1059
    name: Command and Scripting Interpreter
    tactic: TA0002
    sigma_rule_ref: tier2-telemetry/sigma/rules/execution/suru-t1059-command-scripting-interpreter.yml  # [STUB: file does not exist]
    selection_sketch:
      process.parent.name|endswith:
        - 'winword.exe'
        - 'excel.exe'
        - 'outlook.exe'
      process.name|endswith:
        - 'powershell.exe'
        - 'cmd.exe'
        - 'wscript.exe'
        - 'cscript.exe'
    falsepositives:
      - Legitimate admin scripting via approved RMM/scheduled-task tooling
      - Office macro-enabled business workflows (must be allowlisted by host/user)
    notes: >
      PLACEHOLDER selection logic. Real rule must be authored against confirmed
      process.* fields once suru_endpoint.yml mappings are verified.

  - id: T1547
    name: "Boot or Logon Autostart Execution"
    tactic: TA0003
    sigma_rule_ref: tier2-telemetry/sigma/rules/persistence/suru-t1547-boot-logon-autostart.yml  # [STUB: file does not exist]
    selection_sketch:
      registry.path|contains:
        - 'CurrentVersion\\Run'
        - 'CurrentVersion\\RunOnce'
      event.action: 'registry_value_set'
    falsepositives:
      - Legitimate software installers registering autostart entries
    notes: >
      PLACEHOLDER selection logic. Real rule must be authored against confirmed
      registry.* fields once suru_endpoint.yml mappings are verified.

  - id: T1543
    name: "Create or Modify System Process"
    tactic: TA0003
    sigma_rule_ref: tier2-telemetry/sigma/rules/persistence/suru-t1543-create-modify-system-process.yml  # [STUB: file does not exist]
    selection_sketch:
      event.action: 'service_created'
      process.command_line|contains: 'sc.exe create'
    falsepositives:
      - Legitimate software/agent installation creating a new Windows service
    notes: >
      PLACEHOLDER selection logic. Service-creation event shape unconfirmed.

  - id: T1053
    name: "Scheduled Task/Job"
    tactic: TA0002
    sigma_rule_ref: tier2-telemetry/sigma/rules/execution/suru-t1053-scheduled-task-job.yml  # [STUB: file does not exist]
    selection_sketch:
      process.name|endswith: 'schtasks.exe'
      process.command_line|contains: '/create'
    falsepositives:
      - Legitimate backup/maintenance scheduled-task creation
    notes: >
      PLACEHOLDER selection logic. schtasks.exe vs cron-equivalent on Linux
      endpoints not yet differentiated — needs real platform field once endpoint
      OS diversity is known.

