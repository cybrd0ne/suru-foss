# SURU Platform — Layer 3 ECS Field-Mapping Bridge
# Log type: Zeek ssl.log + notice.log/weird.log TLS-relevant entries
#           (suru-zeek-* index, event.dataset:"ssl"/"notice"/"weird")
# Purpose: maps Sigma-abstract field names (Layer 1) to the concrete ECS v8
#          field path emitted by this deployment's Logstash Zeek pipeline, for
#          OpenSearch Security Analytics custom-log-type field-mapping.
#
# Sources of truth cross-checked for every ecs_field below:
#   - `tier2-telemetry/opensearch/field-mappings/README.md` "Zeek network services (suru-zeek-*)"
#     and the "Notice vs. weird" note (notice => event.kind:"alert", weird stays
#     event.kind:"event"; both carry rule.name)
#   - tier3-core/config/opensearch/index-templates/suru-ecs-template.json
#
# Backs coverage category 5 (defense evasion): notice/weird/ssl anomalies such
# as invalid/self-signed certs, version downgrade, and ssl handshake without
# matching SNI.

log_type: suru_zeek_ssl
index_pattern: suru-zeek-*
description: >
  Zeek ssl.log (TLS handshake metadata) plus TLS-relevant notice.log/weird.log
  entries, normalized to ECS v8 by the tier3-core Logstash Zeek pipeline.
  Filter event.dataset:"ssl" for handshake records, or event.dataset:"notice"/
  "weird" for the Zeek-native anomaly detections layered on top.

mappings:
  - raw_field: timestamp
    ecs_field: "@timestamp"
  - raw_field: event_dataset
    ecs_field: event.dataset
  - raw_field: event_kind
    ecs_field: event.kind
  - raw_field: orig_h
    ecs_field: source.ip
  - raw_field: resp_h
    ecs_field: destination.ip
  - raw_field: server_name
    ecs_field: tls.sni
  - raw_field: tls_version
    ecs_field: tls.version

  # notice.log / weird.log (anomaly detections riding the same index)
  - raw_field: notice_note
    ecs_field: rule.name
  - raw_field: notice_msg
    ecs_field: event.reason
  - raw_field: weird_name
    ecs_field: rule.name

  # GeoIP/ASN enrichment (Logstash geoip filter, public IPs only)
  - raw_field: resp_geo_country_name
    ecs_field: destination.geo.country_name
  - raw_field: resp_geo_country_iso_code
    ecs_field: destination.geo.country_iso_code
  - raw_field: resp_as_number
    ecs_field: destination.as.number
  - raw_field: resp_as_org_name
    ecs_field: destination.as.organization.name
