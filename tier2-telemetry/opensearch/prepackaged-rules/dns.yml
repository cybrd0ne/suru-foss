# SURU — Pre-packaged Security Analytics Rules: DNS log type
#
# Source index : suru-zeek-* (event.dataset:"dns")
# SA category  : dns
# Detector name: suru-prepackaged-dns
# Field mapping: tier2-telemetry/opensearch/field-mappings/suru_zeek_dns.yml
#   + alias bridges for non-ECS SA fields (see suru_zeek_dns_aliases.yml)
#
# Toggle: set enabled: true/false. Never edit rule_id or query content.
# Apply : build/render.sh --scope tier3  &&  apply-security-analytics.sh

category: dns
index_pattern: suru-zeek-*
detector_name: suru-prepackaged-dns
detector_type: dns
field_mapping_ref: tier2-telemetry/opensearch/field-mappings/suru_zeek_dns.yml

rules:
  - rule_id: "3eaf6218-3bed-4d8a-8707-274096f12a18"
    title: "Wannacry Killswitch Domain"
    enabled: true
    level: high
    field_available: true      # dns.question.name is confirmed ECS field in zeek index
    log_source: zeek_dns
    mitre:
      tactics:
        - id: TA0011
          name: "Command and Control"
      techniques:
        - id: T1071.001
          name: "Application Layer Protocol: Web Protocols"
    tier1_boundary: additive   # Tier-1 DNSBL doesn't specifically block this domain
    rationale: >
      Named killswitch domain for Wannacry ransomware — a positive lookup means a host
      is sandbox-evaluating Wannacry. Near-zero FP in normal household use.
      Complements Tier-1 DNSBL (not in standard feeds) and SURU custom DNS-entropy detector
      (entropy-based, misses this specific low-entropy domain).
    falsepositives:
      - "Security researchers testing Wannacry sandbox behavior on the LAN"

  - rule_id: "4153a907-2451-4e4f-a578-c52bb6881432"
    title: "Suspicious DNS Query with B64 Encoded String"
    enabled: true
    level: medium
    field_available: true      # dns.question.name is confirmed ECS field in zeek index
    log_source: zeek_dns
    mitre:
      tactics:
        - id: TA0011
          name: "Command and Control"
        - id: TA0010
          name: "Exfiltration"
      techniques:
        - id: T1048.003
          name: "Exfiltration Over Alternative Protocol: Exfiltration Over Unencrypted Non-C2 Protocol"
        - id: T1071.004
          name: "Application Layer Protocol: DNS"
    tier1_boundary: additive
    rationale: >
      Detects base64-encoded data in DNS subdomains (== padding in domain label) — a common
      DNS tunneling/exfil encoding indicator. Complements SURU_DNS::DNS_High_Entropy_Query
      (entropy-based) with a specific encoding-pattern angle.
    falsepositives:
      - "CDN or cookie-sync subdomains with base64-encoded identifiers — allowlist known CDN domains"
      - "DNSSEC signed zones with certain long label encodings"

  - rule_id: "8ae51330-899c-4641-8125-e39f2e07da72"
    title: "DNS TXT Answer with Possible Execution Strings"
    enabled: true
    level: high
    field_available: false     # dns.answers.type / 'answer' NOT in zeek index
    field_mapping_note: >
      Rule queries 'dns.answers.type' and 'answer' fields. Zeek index has 'dns.rrtype'
      (answer record type) and 'dns.resolved' (answer content). SA alias field mappings
      dns.answers.type→dns.rrtype and answer→dns.resolved must be registered via
      _plugins/_security_analytics/mappings before this rule will fire.
    log_source: zeek_dns
    mitre:
      tactics:
        - id: TA0011
          name: "Command and Control"
      techniques:
        - id: T1071.004
          name: "Application Layer Protocol: DNS"
    tier1_boundary: additive
    rationale: >
      PowerShell/cmd.exe payload delivery via DNS TXT records — extremely high precision,
      near-zero FP. TXT records benignly contain SPF/DKIM/DMARC but never IEX/Invoke-Expression.
      Nothing in Tier 1 or our custom detectors covers TXT record content inspection.
    falsepositives:
      - "Virtually none — IEX/Invoke-Expression strings do not appear in legitimate TXT records"

  - rule_id: "1ec4b281-aa65-46a2-bdae-5fd830ed914e"
    title: "Possible DNS Tunneling"
    enabled: true
    level: high
    field_available: false     # dns.question.registered_domain NOT in zeek index
    field_mapping_note: >
      Rule queries 'dns.question.registered_domain'. Zeek index has 'dns.question.name'
      (the full FQDN). SA alias field mapping dns.question.registered_domain→dns.question.name
      must be registered — the match semantics differ (full FQDN vs eTLD+1) so the rule
      will match on the full query name rather than the registered domain specifically.
    log_source: zeek_dns
    mitre:
      tactics:
        - id: TA0011
          name: "Command and Control"
        - id: TA0010
          name: "Exfiltration"
      techniques:
        - id: T1071.004
          name: "Application Layer Protocol: DNS"
        - id: T1048.003
          name: "Exfiltration Over Alternative Protocol"
    tier1_boundary: exclusion-predicates-required
    rationale: >
      Volume-based DNS tunneling detection via registered-domain aggregation. Complements
      our entropy-based SURU_DNS::DNS_High_Entropy_Query with a domain-volume angle —
      catches low-entropy but high-volume tunneling (e.g. iodine, dns2tcp). Overlaps Tier-1
      emerging-dns category so exclusion predicates must be applied.
    falsepositives:
      - "Legitimate CDN/telemetry domains with high query volume (Google, Cloudflare, Akamai)"
      - "Home automation devices polling a cloud API frequently"
      - "Threshold tuning required per environment"
