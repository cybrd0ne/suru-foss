# SURU Platform — CI Pipeline
# lint → test (go vet/build/test) + gosec → scan (trivy, semgrep)
#
# Actions pinned to full commit SHAs (immutable).
# Tags are mutable and were weaponised in the March 2026 supply chain attack
# (aquasecurity/trivy-action — 75/76 tags force-pushed to malicious commits).
# NEVER reference a floating tag or branch for third-party actions.

name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read          # minimum for checkout

jobs:

  # ────────────────────────────────────────────────────────────
  # 1. Lint — shellcheck, docker compose config
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: shellcheck
        run: |
          # apt-get update first — without it `install` can fail on a stale
          # package index when the runner image lags the mirror (SEC-086).
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find . -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning

      - name: docker compose config
        run: |
          find . \( -name 'docker-compose*.yml' -o -name 'docker-compose*.yaml' \
                 -o -name 'compose.yaml' -o -name 'compose.yml' \) -print0 \
          | xargs -0 -I{} sh -c 'echo "Checking {}"; docker compose -f "{}" config > /dev/null'
          # Covers tier3-core/datalake/opensearch/compose.yaml (suru.t3.datalake.securityanalytics-init
          # + suru.t3.datalake.ti-init services, SIEM Security Analytics feature) via the glob above —
          # no separate invocation needed.

      - name: tier2-telemetry render pipeline tests (test-render.sh)
        # Covers render.sh --scope tier1 (existing perimeter render, unchanged output contract)
        # and --scope tier3 (new SIEM Security Analytics render: Sigma/detectors/correlations/
        # actions/STIX2 -> tier3-core/config/opensearch/security-analytics/, which is gitignored
        # build output, never committed JSON). yq is self-installed by render.sh with checksum
        # verification if missing; jq and python3 are preinstalled on ubuntu-24.04 runners.
        run: |
          bash tier2-telemetry/build/tests/test-render.sh --verbose

      - name: Sigma rules — required-field / MITRE-tag / ECS-field-path validation (blocking)
        # Mirrors tier2-telemetry/sigma/README.md "Validation" section exactly:
        #   1. Deny-list grep for raw EVE / non-ECS field paths — must be zero matches.
        #   2. YAML + required-field + MITRE tag (TA#### AND T####) + falsepositives sanity,
        #      via the same checks documented in the README, run from a standalone script
        #      (not an inline heredoc — embedding a multi-line python3 -c string directly in
        #      a YAML block scalar is indentation-fragile and breaks YAML parsing).
        # This is the blocking gate (works without the sigma CLI). `sigma check` itself runs
        # as a separate best-effort, non-blocking step below — see that step's comment for why.
        run: |
          set -euo pipefail

          echo "Deny-list: raw EVE / non-ECS field paths must not appear in canonical Sigma rules"
          if grep -rnE 'alert\.|suricata\.eve|qtype_name' tier2-telemetry/sigma/rules/; then
            echo "::error::Raw EVE / non-ECS field path found in tier2-telemetry/sigma/rules/ — see tier2-telemetry/sigma/README.md contract"
            exit 1
          fi
          echo "Deny-list check passed: zero matches."

          echo "YAML + required-field + MITRE-tag + falsepositives validation"
          bash tier2-telemetry/sigma/validate-sigma-rules.sh

      - name: Sigma rules — sigma-cli structural/schema check (best-effort, non-blocking)
        # sigma-cli (pip install sigma-cli) was NOT confirmed installable/usable in this CI
        # environment at authoring time — tier2-telemetry/sigma/README.md "Validation" section
        # documents this as a known verification gap, not a skipped step, as of 2026-06-24.
        # [MISSING REFERENCE: sigma-cli PyPI package installability + `sigma check` subcommand
        # behavior on GitHub Actions ubuntu-24.04 runners — propose web search:
        # "sigma-cli pip install github actions sigma check command"]
        # This step attempts the install and check opportunistically; failure here is reported
        # but does NOT block CI (continue-on-error), so a transient PyPI/environment issue can
        # never block merges. The blocking gate is the deny-list + python3 step above, which is
        # confirmed to work without the sigma CLI.
        if: always()
        continue-on-error: true
        run: |
          pip install --quiet sigma-cli
          find tier2-telemetry/sigma/rules -name '*.yml' -print0 \
            | xargs -0 -n1 sigma check

  # ────────────────────────────────────────────────────────────
  # 2. Test — go vet / build / test (SEC-083)
  #    Forward-looking gate: no Go code exists yet, so the Go steps are
  #    guarded on go.mod presence and the job passes (inert) until Go code
  #    lands. The instant a go.mod appears, vet+build+test become blocking.
  # ────────────────────────────────────────────────────────────
  test:
    name: Go test & vet
    runs-on: ubuntu-24.04
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Detect Go modules
        id: detect
        run: |
          if find . -path ./vendor -prune -o -name go.mod -print | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No go.mod found — Go vet/build/test gate is inert until Go code is added."
          fi

      - name: Set up Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: stable

      - name: go vet / build / test
        if: steps.detect.outputs.has_go == 'true'
        run: |
          go vet ./...
          go build ./...
          go test ./...

  # ────────────────────────────────────────────────────────────
  # 3. gosec — Go SAST (SEC-083)
  #    Same go.mod guard as the test job; inert until Go code exists.
  # ────────────────────────────────────────────────────────────
  gosec:
    name: gosec (Go SAST)
    runs-on: ubuntu-24.04
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Detect Go modules
        id: detect
        run: |
          if find . -path ./vendor -prune -o -name go.mod -print | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No go.mod found — gosec gate is inert until Go code is added."
          fi

      - name: gosec
        if: steps.detect.outputs.has_go == 'true'
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889  # v2.27.1
        with:
          args: ./...

  # ────────────────────────────────────────────────────────────
  # 4. Scan — trivy (SHA-pinned), semgrep (digest-pinned, tokenless)
  # ────────────────────────────────────────────────────────────
  scan:
    name: Scan
    runs-on: ubuntu-24.04
    needs: lint
    permissions:
      contents: read
      security-events: write   # required for SARIF upload to GitHub Security tab
      actions: read            # required by codeql-action/upload-sarif to read workflow run info
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # ── Trivy filesystem scan (blocking) ───────────────────
      # Pinned to ed142fd0673e97e23eac54620cfb913e5ce36c25 = v0.36.0
      # DO NOT change this to a tag reference — tags were weaponised in
      # the March 2026 supply chain attack on aquasecurity/trivy-action.
      - name: Trivy — filesystem scan (blocking, fixable only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy FS results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        continue-on-error: true   # non-fatal: repo may not have code scanning enabled
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # ── Trivy unfixed-CVE surface (informational, non-blocking) ──
      # ignore-unfixed:true on the blocking scan above means an actively
      # exploited CRITICAL with no upstream patch would NOT block. This second
      # pass surfaces those unfixable Criticals in the log without failing the
      # job, so they're visible for risk-acceptance (SEC-084).
      - name: Trivy — unfixed CRITICAL surface (non-blocking)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL
          exit-code: '0'           # informational — never blocks
          ignore-unfixed: false

      # ── semgrep — SAST (deterministic, tokenless) ──────────
      # Run the official semgrep image PINNED BY DIGEST (1.90.0). The gate blocks
      # in-repo via `scan --error` rather than depending on a Semgrep-Cloud policy
      # through SEMGREP_APP_TOKEN (SEC-084). --metrics=off keeps it local-first.
      #
      # Ruleset note (SEC-084): the previous configs referenced `p/bash` (HTTP 404 —
      # not a real registry pack) and `p/supply-chain` (not a `scan` pack); tokenless
      # those would fail the whole run. They are replaced with valid, verified packs.
      #
      # Two tiers:
      #   • BLOCKING — packs that are GREEN on the current repo, so any NEW finding
      #     deterministically fails the job: p/secrets (0), p/terraform (0),
      #     p/command-injection (0). Highest-value must-never-regress classes.
      #   • INFORMATIONAL — packs with pre-existing findings surfaced in the log but
      #     not yet blocking: p/dockerfile (2: content-sync Dockerfile USER is fixed
      #     in a separate PR; mdns Dockerfile USER is a tracked follow-up) and
      #     p/security-audit (11). Promote these to the blocking tier once triaged.
      - name: semgrep — SAST (blocking, tokenless)
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep@sha256:7b625711ba9b6d1a543e308967b18c01b59932490a5536a06422666474bf6ee4 \
            semgrep scan --error --metrics=off \
              --config p/secrets \
              --config p/terraform \
              --config p/command-injection

      - name: semgrep — broader SAST (informational, non-blocking)
        if: always()
        run: |
          # Surfaces pre-existing p/dockerfile + p/security-audit findings without
          # gating. `|| true` guarantees this step never blocks CI (SEC-084).
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep@sha256:7b625711ba9b6d1a543e308967b18c01b59932490a5536a06422666474bf6ee4 \
            semgrep scan --metrics=off \
              --config p/dockerfile \
              --config p/security-audit || true
