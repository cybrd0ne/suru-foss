input {
  pipeline { address => "pfsense-services-pipe" }
}

filter {
  mutate {
    add_field => {
      "[ecs][version]" => "8.0.0"
      "[event][module]" => "pfsense"
      "[observer][product]" => "pfSense"
      "[observer][type]" => "firewall"
      "[service][type]" => "pfsense"
      "[_suru][tier]" => "tier1-perimeter"
    }
  }
  if [program] == "dhcpd" or [program] == "dhclient" {
    mutate { add_field => { "[event][dataset]" => "pfsense.dhcp" "[event][category]" => "network" "[event][kind]" => "event" } }
  } else if [program] == "unbound" or [program] == "dnsmasq" {
    mutate { add_field => { "[event][dataset]" => "pfsense.dns" "[event][category]" => "network" "[event][kind]" => "event" "[network][protocol]" => "dns" } }
    # Parse unbound DNS query line: [PID:THREAD] info: CLIENT_IP FQDN. TYPE CLASS
    # Using dissect (literal field splitting) since grok bracket escaping in Logstash 9 is unreliable.
    # MITRE ATT&CK: TA0011/T1071.004 DNS — resolution requests reveal C2 domains and data exfil.
    # FP: CDN/telemetry (google, apple, windows-update) dominate — expected.
    dissect {
      mapping => { "message" => "[%{_pid}:%{_thread}] info: %{_dns_client_ip} %{_dns_qname} %{_dns_qtype} %{_dns_qclass}" }
      tag_on_failure => ["_unbound_not_query"]
    }
    # Non-query unbound lines (stats, histogram, lifecycle) are forwarded to OpenSearch
    # as event.dataset "unbound.log" so errors and DNSSEC failures remain visible.
    # SEC-057-D: removed drop {} — unbound errors are operationally significant.
    if "_unbound_not_query" in [tags] {
      mutate { replace => { "[event][dataset]" => "unbound.log" } }
    }
    # Promote to ECS paths and strip trailing FQDN dot
    mutate {
      rename => {
        "_dns_client_ip" => "[source][ip]"
        "_dns_qname"     => "[dns][question][name]"
        "_dns_qtype"     => "[dns][question][type]"
        "_dns_qclass"    => "[dns][question][class]"
      }
      remove_field => ["_pid", "_thread"]
    }
    mutate { gsub => [ "[dns][question][name]", "[.]$", "" ] }
  } else if [program] == "openvpn" {
    mutate { add_field => { "[event][dataset]" => "pfsense.openvpn" "[event][category]" => "authentication" "[network][protocol]" => "openvpn" } }
  } else if [program] == "ipsec" or [program] == "charon" or [program] == "strongswan" or [program] == "racoon" {
    mutate { add_field => { "[event][dataset]" => "pfsense.ipsec" "[event][category]" => "network" "[network][protocol]" => "ipsec" } }
  } else if [program] == "sshd" or [facility] == "auth" or [facility] == "authpriv" {
    mutate { add_field => { "[event][dataset]" => "pfsense.auth" "[event][category]" => "authentication" "[event][kind]" => "event" } }
  } else if [program] == "php" or [program] == "php-fpm" or [message] =~ /config\.xml|Configuration change|Saved configuration|admin@/ {
    mutate { add_field => { "[event][dataset]" => "pfsense.config" "[event][category]" => "configuration" "[event][type]" => "change" } }
  } else {
    mutate { add_field => { "[event][dataset]" => "pfsense.system" "[event][category]" => "host" "[event][kind]" => "event" } }
  }

  # SEC-012: preserve ingest time then overwrite @timestamp with event time.
  # pfSense service logs (unbound, dhcpd, sshd, etc.) carry no per-event
  # timestamp in the message body; use the syslog-ng envelope `time` field
  # (ISO8601 set by Tier 1 syslog-ng at the moment of log receipt).
  mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
  date {
    match          => ["time", "ISO8601"]
    target         => "@timestamp"
    tag_on_failure => ["_dateparsefailure"]
  }
}

output {
  if "_dateparsefailure" in [tags] {
    pipeline { send_to => "quarantine-pipe" }
  } else {
    opensearch {
      ecs_compatibility => "v8"
      hosts => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
      user => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl => true
      cacert => "/usr/share/logstash/certs/root-ca.pem"
      index => "suru-pfsense-services-%{+YYYY.MM.dd}"
    }
  }
}
