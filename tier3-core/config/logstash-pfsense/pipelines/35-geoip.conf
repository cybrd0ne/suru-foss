# =============================================================================
# Pipeline : geoip (central GeoIP/ASN enrichment)
# Source   : events routed from 10-pfsense-firewall / 20-suricata-eve /
#            30-zeek via `pipeline { send_to => "geoip-pipe" }`
# Index    : routed back to each source's index by event.module
# ECS ver  : 8.x  (source.geo.*, source.as.*, destination.geo.*, destination.as.*)
# MITRE    : TA0043 Reconnaissance / T1590 — attribute external IPs to country/ASN
# =============================================================================
# THIS FILE IS NOT LISTED IN pipelines.yml DIRECTLY. The logstash entrypoint
# copies it to /tmp/geoip-pipeline/35-geoip.conf ONLY when the MaxMind GeoLite2
# City DB is present; otherwise it copies 35-geoip-passthrough.conf (no geoip).
# This keeps ingestion healthy when no MAXMIND_LICENSE_KEY is configured — the
# geoip filter is FATAL at startup if its database file is missing.
# DB paths come from GEOIP_CITY_DB / GEOIP_ASN_DB (set in compose).
# =============================================================================
input {
  pipeline { address => "geoip-pipe" }
}

filter {
  # Public source IPs → country + ASN. Private/LAN IPs simply fail the lookup
  # (tagged, no geo fields added) — expected and harmless.
  # ecs_compatibility (pipeline default v8) auto-derives the target from the
  # source field: [source][ip] -> [source][geo] (City) / [source][as] (ASN);
  # [destination][ip] -> [destination][geo] / [destination][as]. Do NOT set an
  # explicit `target` or the output double-nests (e.g. source.geo.geo.*).
  if [source][ip] {
    geoip {
      source         => "[source][ip]"
      database       => "${GEOIP_CITY_DB}"
      tag_on_failure => ["_geoip_source_city_lookup_failed"]
    }
    geoip {
      source         => "[source][ip]"
      database       => "${GEOIP_ASN_DB}"
      tag_on_failure => ["_geoip_source_asn_lookup_failed"]
    }
  }
  if [destination][ip] {
    geoip {
      source         => "[destination][ip]"
      database       => "${GEOIP_CITY_DB}"
      tag_on_failure => ["_geoip_destination_city_lookup_failed"]
    }
    geoip {
      source         => "[destination][ip]"
      database       => "${GEOIP_ASN_DB}"
      tag_on_failure => ["_geoip_destination_asn_lookup_failed"]
    }
  }
}

output {
  # Route back to each source index by event.module. Only firewall (pfsense),
  # suricata, and zeek are routed through geoip-pipe, so the pfsense branch is
  # always the firewall index (services/pfblockerng do not route here).
  if [event][module] == "suricata" {
    opensearch {
      ecs_compatibility => "v8"
      hosts    => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
      user     => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl      => true
      cacert   => "/usr/share/logstash/certs/root-ca.pem"
      index    => "suru-suricata-%{+YYYY.MM.dd}"
    }
  } else if [event][module] == "zeek" {
    opensearch {
      ecs_compatibility => "v8"
      hosts    => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
      user     => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl      => true
      cacert   => "/usr/share/logstash/certs/root-ca.pem"
      index    => "suru-zeek-%{+YYYY.MM.dd}"
    }
  } else {
    opensearch {
      ecs_compatibility => "v8"
      hosts    => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
      user     => "${OPENSEARCH_USER}"
      password => "${OPENSEARCH_PASSWORD}"
      ssl      => true
      cacert   => "/usr/share/logstash/certs/root-ca.pem"
      index    => "suru-pfsense-firewall-%{+YYYY.MM.dd}"
    }
  }
}
