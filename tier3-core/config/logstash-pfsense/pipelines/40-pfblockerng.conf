# =============================================================================
# Pipeline : pfblockerng
# Source   : pfBlockerNG DNSBL and IP reputation events from pfSense
# Index    : suru-pfblockerng-YYYY.MM.dd
# ECS ver  : 8.x
# MITRE    : TA0011 — Command and Control / T1071 — Application Layer Protocol (DNS)
#            TA0043 — Reconnaissance / T1590 — Gather Victim Network Information
# REQ      : REQ-001, REQ-003, REQ-004, REQ-005, REQ-006
#
# Format note (corrected 2026-06-23): earlier versions of this pipeline parsed
# a fictional pipe-delimited "IP Block| inbound|1.2.3.4|..." message that
# pfBlockerNG never actually emits. Live-verified on the router: pfBlockerNG
# writes comma-CSV lines to /var/log/pfblockerng/ip_block.log (IP blocks) and
# /var/log/pfblockerng/dnsbl.log (DNS blocks) — see pfblockerng.inc
# pfb_log_event()/$pfb['ip_blocklog']/$pfb['dnslog']. A grok translation of
# these CSV lines was tried first and discarded: with this many consecutive
# %{DATA} captures, Logstash 9.3's grok engine non-deterministically dropped
# every captured field on a full-line match (live-reproduced in this
# container — minimal repro: two consecutive trailing %{DATA} groups with no
# terminating literal silently lose the match). The `csv` filter is the
# correct tool for an actual CSV format and was verified field-for-field
# against live sample lines from this router before being committed here.
#
# ip_block.log's 21-column layout below is live-sample-verified (real lines
# pulled from this router). dnsbl.log's 10-column layout is NOT live-sample
# verified — DNSBL blocking has never worked on this router (that's the bug
# this change fixes), so dnsbl.log has been empty for every check so far.
# The 10-column layout (leading `type` field before `datereq`) is derived
# directly from reading this router's installed pfblockerng.inc
# (pfb_log_event()/pfb_dnsbl_parse()) — ground truth for this exact install.
# A third-party writeup (marceltc.com, pfBlockerNG version/date unstated)
# shows a 9-column sample with NO leading `type` field, suggesting this
# layout may have changed across pfBlockerNG versions. REQUIRED post-deploy
# check: after `make deploy`, trigger a DNS block and `tail -1
# /var/log/pfblockerng/dnsbl.log` on the router; if it has 9 fields instead
# of 10, drop "_pfb_type" from the `columns` list below and remove the
# `[event][reason]` mutate that references it.
# =============================================================================

input {
  pipeline { address => "pfblockerng-pipe" }
}

filter {
  # --- Static ECS metadata (set unconditionally) ---------------------------
  mutate {
    add_field => {
      "[ecs][version]"       => "8.0.0"
      "[event][module]"      => "pfblockerng"
      "[observer][product]"  => "pfBlockerNG"
      "[observer][type]"     => "firewall"
      "[service][type]"      => "pfblockerng"
      "[event][kind]"        => "alert"
      "[event][action]"      => "block"
      "[_suru][tier]"        => "tier1-perimeter"
    }
  }

  # --- Ensure host.name is present (derived from syslog header) ------------
  if ![host][name] {
    mutate {
      add_field => { "[host][name]" => "%{[host][hostname]}" }
    }
  }

  # --- Ensure _suru.log_type is present (should be set by routing) ----------
  if ![_suru][log_type] {
    mutate {
      add_field => { "[_suru][log_type]" => "pfblockerng" }
    }
  }

  # --- IP block events: /var/log/pfblockerng/ip_block.log -------------------
  # 21-column CSV. Sample (live, 2026-06-23):
  #   Jun 23 23:49:57,1770009049,pppoe0,WAN,block,4,6,TCP-S,216.180.246.2,
  #   5.15.66.239,21518,61234,in,US,pfB_PRI1_v4,216.180.246.255,SURU_DShield_v4,
  #   crawler002.deepfield.net,wan,|ASN:  AS396982 | domain:  google.com | name:  Google LLC |,+
  if [program] == "pfblockerng-ip" {
    csv {
      source             => "message"
      separator          => ","
      skip_empty_columns => false
      columns => [
        "_pfb_ts_human", "_pfb_build_epoch", "[observer][ingress][interface][name]",
        "_pfb_iface_label", "_pfb_action", "_pfb_ipver", "_pfb_proto_num",
        "_pfb_tcpflags", "[source][ip]", "[destination][ip]", "[source][port]",
        "[destination][port]", "[network][direction]", "[source][geo][country_iso_code]",
        "[rule][name]", "_pfb_matched_net", "[threat][feed][name]", "[server][domain]",
        "_pfb_iface_friendly", "_pfb_asn_info", "_pfb_dup"
      ]
      convert => {
        "_pfb_proto_num"       => "integer"
        "[source][port]"       => "integer"
        "[destination][port]" => "integer"
      }
    }
    # csv filter has no tag_on_failure option — it always tags _csvparsefailure.
    if "_csvparsefailure" not in [tags] {
      # network.transport from the numeric IANA protocol (6=TCP, 17=UDP, 1=ICMP)
      translate {
        source     => "_pfb_proto_num"
        target     => "[network][transport]"
        dictionary => { "6" => "tcp" "17" => "udp" "1" => "icmp" }
        fallback   => "%{_pfb_proto_num}"
      }

      # ASN info arrives as "|ASN:  AS396982 | domain:  google.com | name:  Google LLC |"
      grok {
        match => {
          "_pfb_asn_info" => "ASN:\s*AS%{NUMBER:[source][as][number]:int}\s*\|\s*domain:\s*%{DATA:_pfb_asn_domain}\s*\|\s*name:\s*%{DATA:[source][as][organization][name]}\s*\|?\s*$"
        }
        tag_on_failure => ["_pfblockerng_asn_parse_failure"]
      }

      mutate {
        add_field => {
          "[threat][indicator][type]"       => "ipv4-addr"
          "[threat][indicator][name]"       => "%{[source][ip]}"
          "[event][category]"               => ["threat", "network"]
          "[event][type]"                   => ["denied", "connection"]
          "[threat][indicator][confidence]" => "High"
        }
        rename => { "_pfb_dup" => "[event][duplicate]" }
      }
      # Two separate mutate filters: mutate's internal operation order runs
      # convert before gsub regardless of YAML field order, so a combined
      # gsub+convert in one mutate block converts the pre-gsub "+"/"-"
      # string (silently producing the wrong boolean) instead of the
      # post-gsub "false"/"true" string. Live-verified in this container.
      mutate { gsub => [ "[event][duplicate]", "\+", "false", "[event][duplicate]", "-", "true" ] }
      mutate { convert => { "[event][duplicate]" => "boolean" } }

      # The CSV's 2nd column ("_pfb_build_epoch") is NOT a per-event
      # timestamp — live samples show many consecutive block events spanning
      # several real seconds (ts_human advancing 23:49:57 -> 23:50:06) all
      # sharing the exact same epoch value. It reflects the last alias-list
      # rebuild time, not the block event time; using it as @timestamp would
      # silently produce a stale, wrong time for every event until the next
      # cron rebuild. ts_human has no year, so — same as dnsbl.log below —
      # @timestamp falls back to the syslog-ng envelope `time` field
      # (SEC-012: envelope-fallback precedence when no usable in-payload
      # event time exists).
      mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
      date {
        match          => ["time", "ISO8601"]
        target         => "@timestamp"
        tag_on_failure => ["_dateparsefailure"]
      }

      mutate {
        remove_field => [
          "_pfb_ts_human", "_pfb_build_epoch", "_pfb_iface_label", "_pfb_action",
          "_pfb_ipver", "_pfb_proto_num", "_pfb_tcpflags", "_pfb_matched_net",
          "_pfb_iface_friendly", "_pfb_asn_info", "_pfb_asn_domain"
        ]
      }
    } else {
      mutate {
        add_field => {
          "[event][category]" => ["threat", "network"]
          "[event][type]"     => ["denied", "connection"]
        }
      }
    }
  }

  # --- DNS block events: /var/log/pfblockerng/dnsbl.log ----------------------
  # 10-column CSV, per pfb_log_event()/pfb_dnsbl_parse() in pfblockerng.inc:
  #   type,datereq,domain,src_ip,req_agent,pfb_mode,pfb_group,pfb_final,pfb_feed,dup_entry
  # type is one of DNSBL-HTTPS|DNSBL-Full|DNSBL-JS|DNSBL-1x1|DNSBL-Unknown.
  # datereq has no year ("Jun 23 14:32:10") — no in-payload epoch exists for
  # this log, so @timestamp falls back to the syslog-ng envelope `time` field
  # (SEC-012: envelope-fallback precedence when no usable in-payload event
  # time exists).
  if [program] == "pfblockerng-dnsbl" {
    csv {
      source             => "message"
      separator          => ","
      skip_empty_columns => false
      columns => [
        "_pfb_type", "_pfb_datereq", "[dns][question][name]", "[source][ip]",
        "_pfb_req_agent", "_pfb_mode", "[rule][name]", "_pfb_final",
        "[threat][feed][name]", "_pfb_dup"
      ]
    }
    if "_csvparsefailure" not in [tags] {
      mutate {
        add_field => {
          "[threat][indicator][type]"       => "domain-name"
          "[threat][indicator][name]"       => "%{[dns][question][name]}"
          "[event][category]"               => ["threat", "network"]
          "[event][type]"                   => ["denied", "connection"]
          "[threat][indicator][confidence]" => "High"
          "[event][reason]"                 => "%{_pfb_type}"
        }
        rename => { "_pfb_dup" => "[event][duplicate]" }
      }
      # Two separate mutate filters: mutate's internal operation order runs
      # convert before gsub regardless of YAML field order, so a combined
      # gsub+convert in one mutate block converts the pre-gsub "+"/"-"
      # string (silently producing the wrong boolean) instead of the
      # post-gsub "false"/"true" string. Live-verified in this container.
      mutate { gsub => [ "[event][duplicate]", "\+", "false", "[event][duplicate]", "-", "true" ] }
      mutate { convert => { "[event][duplicate]" => "boolean" } }
      # Prefer the final resolved match (handles TLD/CNAME matches) when present.
      if [_pfb_final] and [_pfb_final] != "Unknown" {
        mutate { replace => { "[threat][indicator][name]" => "%{_pfb_final}" } }
      }

      mutate {
        remove_field => ["_pfb_type", "_pfb_datereq", "_pfb_req_agent", "_pfb_mode", "_pfb_final"]
      }
    } else {
      mutate {
        add_field => {
          "[event][category]" => ["threat", "network"]
          "[event][type]"     => ["denied", "connection"]
        }
      }
    }

    # SEC-012: pfBlockerNG's DNSBL message carries no full timestamp (year
    # is absent); use the syslog-ng envelope `time` field set at receipt.
    mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
    date {
      match          => ["time", "ISO8601"]
      target         => "@timestamp"
      tag_on_failure => ["_dateparsefailure"]
    }
  }
}

output {
  if "_dateparsefailure" in [tags] {
    pipeline { send_to => "quarantine-pipe" }
  } else {
    opensearch {
      ecs_compatibility => "v8"
      hosts            => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
      user             => "${OPENSEARCH_USER}"
      password         => "${OPENSEARCH_PASSWORD}"
      ssl              => true
      cacert           => "/usr/share/logstash/certs/root-ca.pem"
      index            => "suru-pfblockerng-%{+YYYY.MM.dd}"
    }
  }
}

# Validate:
# docker exec suru.t3.ingestion.logstash-pfsense logstash --config.test_and_exit \
#   -f /usr/share/logstash/pipeline/40-pfblockerng.conf
# curl -k -u admin:$PASS \
#   https://localhost:9200/_cat/indices/suru-pfblockerng-*?v
