# =============================================================================
# Pipeline : pfblockerng
# Source   : pfBlockerNG DNSBL and IP reputation events from pfSense/OPNsense
# Index    : suru-pfblockerng-YYYY.MM.dd
# ECS ver  : 8.x
# MITRE    : TA0011 — Command and Control / T1071 — Application Layer Protocol (DNS)
#            TA0043 — Reconnaissance / T1590 — Gather Victim Network Information
# REQ      : REQ-001, REQ-003, REQ-004, REQ-005, REQ-006
# =============================================================================

input {
  pipeline { address => "pfblockerng-pipe" }
}

filter {
  # --- Static ECS metadata (set unconditionally) ---------------------------
  mutate {
    add_field => {
      "[ecs][version]"       => "8.0.0"
      "[event][module]"      => "pfblockerng"
      "[observer][product]"  => "pfBlockerNG"
      "[observer][type]"     => "firewall"
      "[service][type]"      => "pfblockerng"
      "[event][kind]"        => "alert"
      "[event][action]"      => "block"
      "[_suru][tier]"        => "tier1-perimeter"
    }
  }

  # --- Ensure host.name is present (derived from syslog header) ------------
  if ![host][name] {
    mutate {
      add_field => { "[host][name]" => "%{[host][hostname]}" }
    }
  }

  # --- Ensure _suru.log_type is present (should be set by routing) ----------
  if ![_suru][log_type] {
    mutate {
      add_field => { "[_suru][log_type]" => "pfblockerng" }
    }
  }

  # --- Parse pfBlockerNG message -------------------------------------------
  # Two formats are emitted by pfBlockerNG:
  #
  # DNSBL (program: pfblockerng-dnsbl or pfblockerng):
  #   DNSBL Block| ads.example.com|192.168.1.100|60|EasyList|ADs_Group
  #
  # IP reputation (program: pfblockerng-ip or pfblockerng):
  #   IP Block| inbound|1.2.3.4|192.168.1.1|443|TCP|pfB_Top_v4|Top Spammers
  #
  # MITRE TA0011/T1071 — blocked C2 DNS beacon (DNSBL hit)
  # MITRE TA0043/T1590 — blocked recon source IP (IP reputation hit)
  grok {
    match => {
      "message" => [
        "DNSBL %{WORD:_pfb_verdict}\\|[ ]*(?<[dns][question][name]>[A-Za-z0-9_.-]+)\\|%{IP:[source][ip]}\\|%{INT:_pfb_ttl}\\|%{DATA:[threat][feed][name]}\\|%{GREEDYDATA:_pfb_group}",
        "IP %{WORD:_pfb_verdict}\\|[ ]*%{WORD:_pfb_direction}\\|%{IP:[source][ip]}\\|%{IP:[destination][ip]}\\|%{INT:[destination][port]:int}\\|%{WORD:[network][transport]}\\|%{DATA:[threat][feed][name]}(?:\\|%{GREEDYDATA:_pfb_group})?"
      ]
    }
    tag_on_failure => ["_pfblockerng_parse_failure"]
  }

  # --- Set ECS threat and event fields based on event type -----------------
  if [dns][question][name] {
    # DNSBL event: domain blocked by DNS blocklist
    mutate {
      add_field => {
        "[threat][indicator][type]"  => "domain-name"
        "[threat][indicator][name]"  => "%{[dns][question][name]}"
        "[event][category]"          => ["threat", "network"]
        "[event][type]"              => ["denied", "connection"]
      }
    }
  } else if [source][ip] and "_pfblockerng_parse_failure" not in [tags] {
    # IP reputation event: source IP matched a reputation feed
    mutate {
      add_field => {
        "[threat][indicator][type]"  => "ipv4-addr"
        "[threat][indicator][name]"  => "%{[source][ip]}"
        "[event][category]"          => ["threat", "network"]
        "[event][type]"              => ["denied", "connection"]
      }
    }
  } else if "_pfblockerng_parse_failure" in [tags] {
    # Parse failed — still set mandatory ECS arrays so dashboard queries succeed
    mutate {
      add_field => {
        "[event][category]" => ["threat", "network"]
        "[event][type]"     => ["denied", "connection"]
      }
    }
  }

  # --- Set indicator confidence and clean up temp fields -------------------
  if "_pfblockerng_parse_failure" not in [tags] {
    mutate {
      add_field => { "[threat][indicator][confidence]" => "High" }
      remove_field => ["_pfb_verdict", "_pfb_ttl", "_pfb_direction", "_pfb_group"]
    }
  }

  # SEC-012: preserve ingest time then overwrite @timestamp with event time.
  # pfBlockerNG message body carries no timestamp; use the syslog-ng envelope
  # `time` field (ISO8601 set by Tier 1 syslog-ng at the moment of log receipt).
  mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
  date {
    match          => ["time", "ISO8601"]
    target         => "@timestamp"
    tag_on_failure => ["_dateparsefailure"]
  }
}

output {
  if "_dateparsefailure" in [tags] {
    pipeline { send_to => "quarantine-pipe" }
  } else {
    opensearch {
      ecs_compatibility => "v8"
      hosts            => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
      user             => "${OPENSEARCH_USER}"
      password         => "${OPENSEARCH_PASSWORD}"
      ssl              => true
      cacert           => "/usr/share/logstash/certs/root-ca.pem"
      index            => "suru-pfblockerng-%{+YYYY.MM.dd}"
    }
  }
}

# Validate:
# docker exec suru.t3.ingestion.logstash-pfsense logstash --config.test_and_exit \
#   -f /usr/share/logstash/pipeline/40-pfblockerng.conf
# curl -k -u admin:$PASS \
#   https://localhost:9200/_cat/indices/suru-pfblockerng-*?v
