input {
  pipeline { address => "zeek-pipe" }
}

filter {
  if [message] =~ /^\s*\{/ {
    json { source => "message" tag_on_failure => ["_json_zeek_failed"] }
  }

  # Zeek files.log emits a scalar `source` field (e.g. "HTTP" — the protocol that
  # carried the file). It collides with the ECS `source` object created below
  # (source.ip/source.port), producing mapper_parsing_exception and silently
  # dropping every zeek-files doc. Move the scalar aside first (no-op when absent).
  mutate { rename => { "source" => "[zeek][file_source]" } }

  # --- Common Zeek fields → ECS ---------------------------------------------
  # Zeek emits the connection 5-tuple as dotted top-level keys (id.orig_h …);
  # the json filter keeps them as literal field names (no nesting). Map to ECS.
  # mutate runs rename before add_field, so `service` is cleared before
  # [service][type] is set (prevents "cannot set nested key on array").
  # MITRE ATT&CK: TA0011 / T1071 — application-layer protocol detection.
  mutate {
    rename => {
      "id.orig_h" => "[source][ip]"
      "id.orig_p" => "[source][port]"
      "id.resp_h" => "[destination][ip]"
      "id.resp_p" => "[destination][port]"
      "proto"     => "[network][transport]"
      "uid"       => "[zeek][uid]"
      "service"   => "[network][application]"
    }
    add_field => {
      "[ecs][version]"      => "8.0.0"
      "[event][kind]"       => "event"
      "[event][category]"   => "network"
      "[event][type]"       => "info"
      "[event][module]"     => "zeek"
      "[observer][product]" => "Zeek"
      "[observer][type]"    => "network_sensor"
      "[service][type]"     => "zeek"
    }
  }

  # --- Per-log-type ECS normalisation (routed by syslog program-override) ----
  # Tier 1 syslog-ng tags each Zeek log file with program-override("zeek-<type>")
  # (see tier1-perimeter/templates/pfsense/syslog-ng.conf.tpl). event.dataset is
  # the bare Zeek log name so dashboards filter on event.dataset:"dns"/"dhcp"/…
  if [program] == "zeek-dns" {
    # MITRE ATT&CK: TA0011 / T1071.004 — Application Layer Protocol: DNS
    mutate {
      add_field => { "[event][dataset]" => "dns" }
      rename => {
        "query"       => "[dns][question][name]"
        "qtype_name"  => "[dns][question][type]"
        "qclass_name" => "[dns][question][class]"
        "rcode_name"  => "[dns][response_code]"
        "answers"     => "[dns][resolved]"
      }
    }
  } else if [program] == "zeek-dhcp" {
    # MITRE ATT&CK: TA0007 Discovery / T1018 Remote System Discovery — DHCP
    # lease activity inventories hosts (IP↔MAC↔hostname) on the LAN.
    # client_addr/server_addr/mac map to ECS source/destination/source.mac so
    # DHCP clients appear in cross-source IP/MAC views; DHCP-specific lease
    # attributes live under the dhcp.* namespace.
    mutate {
      add_field => { "[event][dataset]" => "dhcp" }
      rename => {
        "client_addr"    => "[source][ip]"
        "server_addr"    => "[destination][ip]"
        "mac"            => "[source][mac]"
        "host_name"      => "[dhcp][host_name]"
        "assigned_addr"  => "[dhcp][assigned_addr]"
        "requested_addr" => "[dhcp][requested_addr]"
        "lease_time"     => "[dhcp][lease_time]"
        "msg_types"      => "[dhcp][message_types]"
        "domain"         => "[dhcp][domain]"
      }
    }
  } else if [program] == "zeek-conn" {
    mutate { add_field => { "[event][dataset]" => "conn" } }
  } else if [program] == "zeek-http" {
    mutate { add_field => { "[event][dataset]" => "http" } }
  } else if [program] == "zeek-ssl" {
    mutate { add_field => { "[event][dataset]" => "ssl" } }
  } else if [program] == "zeek-notice" {
    mutate { add_field => { "[event][dataset]" => "notice" } }
  } else if [program] == "zeek-weird" {
    mutate { add_field => { "[event][dataset]" => "weird" } }
  } else if [program] == "zeek-files" {
    mutate { add_field => { "[event][dataset]" => "files" } }
  }

  # SEC-012: preserve ingest time then overwrite @timestamp with Zeek event time.
  # Zeek `ts` is a Unix epoch float (e.g. 1234567890.123456); UNIX format handles
  # fractional seconds.
  mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
  date {
    match          => ["ts", "UNIX"]
    target         => "@timestamp"
    tag_on_failure => ["_dateparsefailure"]
  }
}

output {
  if "_dateparsefailure" in [tags] {
    pipeline { send_to => "quarantine-pipe" }
  } else {
    # Route through the central GeoIP enrichment pipeline (35-geoip.conf), which
    # adds source/destination .geo.* + .as.* when a MaxMind DB is present, then
    # indexes into suru-zeek-*. Passthrough (no geo) when no DB.
    pipeline { send_to => "geoip-pipe" }
  }
}

# Validate:
# docker exec suru.t3.ingestion.logstash-pfsense logstash --config.test_and_exit \
#   -f /usr/share/logstash/pipeline/30-zeek.conf
