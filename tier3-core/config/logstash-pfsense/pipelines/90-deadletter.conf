input {
  pipeline { address => "quarantine-pipe" }
}

filter {
  # SEC-053: ensure ECS pipeline_error fields are set before indexing.
  # event.module and event.kind are set here so quarantine events are
  # queryable in SIEM as event.kind:"pipeline_error".
  mutate {
    add_field => {
      "[ecs][version]"     => "8.0.0"
      "[event][module]"    => "quarantine"
      "[event][dataset]"   => "suru.quarantine"
      "[event][kind]"      => "pipeline_error"
    }
  }
}

output {
  # SEC-053: index to suru-quarantine-* so dead-letter events are visible in
  # the SIEM and subject to ISM retention, rather than writing to an unmounted
  # container path that silently loses data on restart and fills overlay disk.
  opensearch {
    ecs_compatibility => "v8"
    hosts            => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
    user             => "${OPENSEARCH_USER}"
    password         => "${OPENSEARCH_PASSWORD}"
    ssl              => true
    cacert           => "/usr/share/logstash/certs/root-ca.pem"
    index            => "suru-quarantine-%{+YYYY.MM.dd}"
  }
}
