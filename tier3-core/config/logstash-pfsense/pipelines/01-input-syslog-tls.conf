# =============================================================================
# Pipeline : pfsense-input-syslog-tls
# Source   : pfSense syslog-ng TCP+TLS mTLS forwarding (port 5140)
# Index    : routed to downstream filter pipelines via suru.log_type
# ECS ver  : 8.x
# MITRE    : TA0011 — Command and Control / T1071.001 — Application Layer Protocol
# REQ      : REQ-001, REQ-003, REQ-004, REQ-005, REQ-006
# =============================================================================
# Validate:
# docker exec suru.t3.ingestion.logstash-pfsense logstash --config.test_and_exit \
#   -f /usr/share/logstash/pipeline/01-input-syslog-tls.conf

input {
  tcp {
    id                          => "syslog_tls_5140"
    port                        => 5140
    ssl_enabled                 => true
    ssl_certificate_authorities => ["/usr/share/logstash/certs/root-ca.pem"]
    ssl_certificate             => "/usr/share/logstash/certs/logstash.pem"
    ssl_key                     => "/usr/share/logstash/certs/logstash-key.pem"
    ssl_client_authentication   => "required"
    codec                       => json_lines {
      decode_size_limit_bytes => 1048576
    }
    ecs_compatibility           => "v8"
  }
}

filter {
  if [@metadata][input][tcp] {
    mutate {
      add_field => {
        "[observer][vendor]"        => "Netgate"
        "[labels][suru][ingest]"    => "tier3-logstash"
      }
    }
  }

  # The tier1 syslog-ng template (templates/pfsense/syslog-ng.conf.tpl,
  # templates/opnsense/syslog-ng.conf.tpl) emits a flat top-level "host"
  # field (host=$HOST — the router's own hostname) on every JSON event.
  # suru-ecs-template.json maps `host` as an ECS object ({name, hostname}),
  # so a flat string there throws mapper_parsing_exception at index time and
  # the event is dropped. Rename it into the ECS leaf before any downstream
  # pipeline (suricata/zeek/pfsense-firewall/pfsense-services/pfblockerng) runs.
  if [host] {
    mutate { rename => { "[host]" => "[host][hostname]" } }
  }

  # Route by _suru.log_type (set by the Tier 1 syslog-ng rewrite rules — authoritative).
  # syslog-ng serialises dot-namespaced fields with underscore prefix: _suru.log_type → [_suru][log_type].
  # [program] fallbacks handle edge cases where _suru.log_type is absent.
  # The former [message] =~ /^\s*\{/ JSON heuristic was removed: it matched every
  # JSON-encoded log (Zeek, DHCP, etc.) before their own branches could fire, causing
  # pfsense-firewall/services/zeek pipelines to receive zero events.
  if [_suru][log_type] == "pfsense-firewall" or [program] == "filterlog" {
    mutate { add_tag => ["route-pfsense-firewall"] }
  } else if [_suru][log_type] =~ /^pfsense-/ or [program] =~ /^(dhcpd|dhclient|openvpn|ipsec|charon|unbound|dnsmasq)$/ or [facility] in ["auth", "authpriv"] {
    mutate { add_tag => ["route-pfsense-services"] }
  } else if [_suru][log_type] == "pfblockerng" or [program] =~ /^pfblockerng-/ {
    mutate { add_tag => ["route-pfblockerng"] }
  } else if [_suru][log_type] == "zeek" or [program] =~ /^zeek-/ {
    mutate { add_tag => ["route-zeek"] }
  } else if [_suru][log_type] == "suricata-eve" or [program] == "suricata" or [program] == "suricata-fast" {
    mutate { add_tag => ["route-suricata"] }
  } else {
    mutate { add_tag => ["route-pfsense-services"] }
  }
}

output {
  if "route-suricata" in [tags] {
    pipeline { send_to => "suricata-eve-pipe" }
  } else if "route-zeek" in [tags] {
    pipeline { send_to => "zeek-pipe" }
  } else if "route-pfblockerng" in [tags] {
    pipeline { send_to => "pfblockerng-pipe" }
  } else if "route-pfsense-firewall" in [tags] {
    pipeline { send_to => "pfsense-firewall-pipe" }
  } else if "route-pfsense-services" in [tags] {
    pipeline { send_to => "pfsense-services-pipe" }
  } else {
    pipeline { send_to => "quarantine-pipe" }
  }
}
