input {
  pipeline { address => "pfsense-firewall-pipe" }
}

filter {
  mutate {
    add_field => {
      "[ecs][version]"          => "8.0.0"
      "[event][module]"         => "pfsense"
      "[event][dataset]"        => "pfsense.filterlog"
      "[observer][product]"     => "pfSense"
      "[observer][type]"        => "firewall"
      "[service][type]"         => "pfsense"
      "[_suru][tier]"            => "tier1-perimeter"
    }
  }

  if [raw_message] {
    mutate { copy => { "[raw_message]" => "[event][original]" } }
  } else if [message] {
    mutate { copy => { "[message]" => "[event][original]" } }
  }

  grok {
    match => {
      "message" => [
        # RFC 5424 — format pfSense syslogd writes to /var/log/filter.log
        # <PRI>1 ISO8601_TIMESTAMP HOSTNAME filterlog PROCID - - CSV
        "^<%{POSINT}>[01] %{TIMESTAMP_ISO8601:[event][created]} %{HOSTNAME:[observer][hostname]} filterlog %{POSINT:[process][pid]:int} - - %{GREEDYDATA:[@metadata][filterlog_csv]}$",
        # RFC 3164 — BSD syslog socket format
        "^%{SYSLOGTIMESTAMP:[event][created]} %{HOSTNAME:[observer][hostname]} filterlog\\[%{POSINT:[process][pid]:int}\\]: %{GREEDYDATA:[@metadata][filterlog_csv]}$",
        "^filterlog\\[%{POSINT:[process][pid]:int}\\]: %{GREEDYDATA:[@metadata][filterlog_csv]}$"
        # SEC-051: catch-all removed — lines not matching the 3 real patterns above
        # will tag _grok_filterlog_failed and route to quarantine.
      ]
    }
    tag_on_failure => ["_grok_filterlog_failed"]
  }

  if "_grok_filterlog_failed" not in [tags] {
    # SEC-050: two-pass CSV parse to handle IPv4 vs IPv6 column layout.
    # IPv4 has 6 extra header fields (tos,ecn,ttl,packet_id,offset,flags) before
    # proto_id; IPv6 has 3 (class,flow,hoplimit) — a 3-column shift that puts
    # src_ip/dst_ip in wrong positions with a single IPv4-shaped parse.
    # tag_on_failure is NOT supported by logstash-filter-csv — removed.

    # Pass 1: parse 9-column common prefix to determine ip_version.
    csv {
      source                    => "[@metadata][filterlog_csv]"
      separator                 => ","
      autogenerate_column_names => false
      columns                   => [
        "rule_number","sub_rule","anchor","tracker","iface","reason","action","direction","ip_version"
      ]
    }

    # Pass 2: re-parse the full CSV with version-specific column layout.
    if [ip_version] == "4" {
      csv {
        source                    => "[@metadata][filterlog_csv]"
        separator                 => ","
        autogenerate_column_names => false
        columns                   => [
          "rule_number","sub_rule","anchor","tracker","iface","reason","action","direction","ip_version",
          "tos","ecn","ttl","packet_id","offset","flags","proto_id","protocol","length",
          "src_ip","dst_ip","src_port","dst_port","data_length","tcp_flags","sequence_number",
          "ack_number","window","urg","options"
        ]
      }
    } else if [ip_version] == "6" {
      csv {
        source                    => "[@metadata][filterlog_csv]"
        separator                 => ","
        autogenerate_column_names => false
        columns                   => [
          "rule_number","sub_rule","anchor","tracker","iface","reason","action","direction","ip_version",
          "ip6class","flow","hoplimit","proto_id","protocol","length",
          "src_ip","dst_ip","src_port","dst_port","data_length"
        ]
      }
    }

    # SEC-050: ICMP rows carry no ports — proto_id 1=ICMPv4, 58=ICMPv6.
    # Stash port-position fields in @metadata so they never reach the integer-mapped
    # [source][port]/[destination][port] ECS fields (prevents mapping rejections).
    # MITRE: TA0043/T1590 Reconnaissance (ICMP ping/scan detection)
    if [proto_id] == "1" or [proto_id] == "58" {
      mutate {
        rename => {
          "src_port" => "[@metadata][icmp_type]"
          "dst_port" => "[@metadata][icmp_code]"
        }
      }
    }

    mutate {
      rename => {
        "iface"       => "[observer][ingress][interface][name]"
        "src_ip"      => "[source][ip]"
        "dst_ip"      => "[destination][ip]"
        "src_port"    => "[source][port]"
        "dst_port"    => "[destination][port]"
        "protocol"    => "[network][transport]"
        "action"      => "[event][action]"
        "reason"      => "[rule][ruleset]"
        "tracker"     => "[rule][id]"
        "rule_number" => "[rule][index]"
        "direction"   => "[network][direction]"
      }
    }

    if [ip_version] == "4" {
      mutate { add_field => { "[network][type]" => "ipv4" } }
    } else if [ip_version] == "6" {
      mutate { add_field => { "[network][type]" => "ipv6" } }
    }

    if [event][action] == "block" {
      mutate { replace  => { "[event][kind]" => "alert" } }
      mutate { add_field => { "[event][type]" => "denied" } }
    } else if [event][action] == "pass" {
      mutate { replace  => { "[event][kind]" => "event" } }
      mutate { add_field => { "[event][type]" => "allowed" } }
    }

    # NAT dataset re-tag. Logstash DSL: no regex flags, no compound `or`
    # between =~ expressions. Case-fold via character class /[Nn][Aa][Tt]/.
    if [source][ip] {
      if [message] =~ /[Nn][Aa][Tt]/ {
        mutate { replace => { "[event][dataset]" => "pfsense.nat" } }
      } else if [rule][ruleset] =~ /[Nn][Aa][Tt]/ {
        mutate { replace => { "[event][dataset]" => "pfsense.nat" } }
      }
    }
  }

  if [event][created] {
    # SEC-012: preserve ingest time then overwrite @timestamp with event time.
    # [event][created] is the RFC 5424/3164 header timestamp from the pfSense filterlog.
    mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
    date {
      # ISO8601 handles RFC 5424 timestamps (with embedded timezone from filter.log).
      # MMM patterns handle RFC 3164 BSD syslog socket timestamps.
      # timezone is ignored when the input carries an explicit offset.
      match          => ["[event][created]", "ISO8601", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target         => "@timestamp"
      timezone       => "UTC"    # pfSense router clock is UTC; adjust if router TZ differs
      tag_on_failure => ["_dateparsefailure"]
    }
  }
}

output {
  # SEC-051: route grok/date-parse failures to quarantine instead of indexing
  # malformed/unknown events in the main firewall index.
  if "_grok_filterlog_failed" in [tags] or "_dateparsefailure" in [tags] {
    pipeline { send_to => "quarantine-pipe" }
  } else {
    # Route through the central GeoIP enrichment pipeline (35-geoip.conf), which
    # adds source/destination .geo.* + .as.* when a MaxMind DB is present, then
    # indexes into suru-pfsense-firewall-*. Passthrough (no geo) when no DB.
    pipeline { send_to => "geoip-pipe" }
  }
}
