input {
  pipeline { address => "suricata-eve-pipe" }
}

filter {
  # Parse the inner EVE JSON. The outer syslog-ng envelope has already been
  # decoded by json_lines in the input; [message] holds the raw EVE JSON string.
  json { source => "message" tag_on_failure => ["_json_suricata_failed"] }

  # SEC-055: drop Suricata stats events immediately after JSON parse — before
  # any rename/add_field. stats events are high-volume counter documents (bytes,
  # packets, flow counts) that inflate mapping, bloat indices, and drive Logstash
  # memory to ~97%. They carry no threat-intelligence value.
  if [event_type] == "stats" { drop {} }

  # Route JSON parse failures straight to quarantine — a half-parsed doc would
  # have no ECS fields and would fill the DLQ with mapping errors.
  if "_json_suricata_failed" in [tags] {
    mutate {
      add_field => {
        "[event][module]"  => "suricata"
        "[event][dataset]" => "parse_error"
        "[event][kind]"    => "pipeline_error"
      }
    }
    # Let the output block below send this to the quarantine pipeline.
  } else {
    mutate {
      add_field => {
        "[ecs][version]"       => "8.0.0"
        "[event][module]"      => "suricata"
        "[observer][product]"  => "Suricata"
        "[observer][type]"     => "ids"
        "[service][type]"      => "suricata"
      }
      rename => {
        "src_ip"     => "[source][ip]"
        "dest_ip"    => "[destination][ip]"
        "src_port"   => "[source][port]"
        "dest_port"  => "[destination][port]"
        "proto"      => "[network][transport]"
        "app_proto"  => "[network][protocol]"
        "event_type" => "[event][dataset]"
        # Suricata 7.x sets service = "<app-protocol>" on DNS/SSL/QUIC events.
        # Rename before add_field sets [service][type]; mutate rename runs first.
        # [network][application] is the ECS field for detected app protocol.
        "service"    => "[network][application]"
      }
    }

    # SEC-011: map alert-specific fields to ECS rule.* and set event.kind.
    # Use signature_id (not gid) for rule.id — gid is always 1 for Suricata built-ins.
    # MITRE: TA0001/T1190, TA0011/T1071 — IDS alerts surface active exploitation/C2.
    if [event][dataset] == "alert" {
      mutate {
        rename => {
          "[alert][signature]"    => "[rule][name]"
          "[alert][signature_id]" => "[rule][id]"
          "[alert][category]"     => "[rule][category]"
          "[alert][severity]"     => "[event][severity]"
        }
        add_field => { "[event][kind]" => "alert" }
      }
    } else {
      mutate { add_field => { "[event][kind]" => "event" } }
    }

    # SEC-012: preserve ingest time then overwrite @timestamp with EVE event time.
    # Suricata EVE carries `timestamp` (ISO8601 with UTC offset) in the inner JSON.
    mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
    date {
      match          => ["timestamp", "ISO8601"]
      target         => "@timestamp"
      tag_on_failure => ["_dateparsefailure"]
    }
  }
}

output {
  if "_json_suricata_failed" in [tags] or "_dateparsefailure" in [tags] {
    pipeline { send_to => "quarantine-pipe" }
  } else {
    # Route through the central GeoIP enrichment pipeline (35-geoip.conf), which
    # adds source/destination .geo.* + .as.* when a MaxMind DB is present, then
    # indexes into suru-suricata-*. Passthrough (no geo) when no DB.
    pipeline { send_to => "geoip-pipe" }
  }
}

# Validate:
# docker exec suru.t3.ingestion.logstash-pfsense logstash --config.test_and_exit \
#   -f /usr/share/logstash/pipeline/20-suricata-eve.conf
# Confirm stats events are dropped (should return 0 for indices created after deploy):
#   GET suru-suricata-*/_search?q=event.dataset:stats&size=0
