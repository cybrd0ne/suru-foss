# Pipeline: Suricata EVE JSON → OpenSearch (ECS v8)
# MITRE ATT&CK: TA0001/T1190, TA0043/T1046
# Fed via P2P pipeline input (address: suricata-pipe); no UDP listener

input {
  pipeline { address => "suricata-pipe" }
}

filter {
  mutate {
    rename => {
      "[src_ip]"           => "[source][ip]"
      "[dest_ip]"          => "[destination][ip]"
      "[src_port]"         => "[source][port]"
      "[dest_port]"        => "[destination][port]"
      "[proto]"            => "[network][transport]"
      "[alert][signature]" => "[rule][name]"
      "[alert][severity]"  => "[event][severity]"
      "[alert][category]"  => "[rule][category]"
      "[alert][signature_id]" => "[rule][id]"
    }
    add_field => {
      "[ecs][version]"     => "8.0.0"
      "[event][dataset]"   => "suricata.alert"
      "[event][module]"    => "suricata"
      "[event][kind]"      => "alert"
      "[observer][type]"   => "ids"
      "[observer][vendor]" => "OISF"
    }
  }
  # SEC-012: preserve ingest time then overwrite @timestamp with EVE event time.
  mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
  date {
    match          => ["timestamp", "ISO8601"]
    target         => "@timestamp"
    timezone       => "UTC"
    tag_on_failure => ["_dateparsefailure"]
  }
}

output {
  opensearch {
    ecs_compatibility => "v8"   # Required for OpenSearch 3.x
    hosts       => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
    user        => "${OPENSEARCH_USER}"
    password    => "${OPENSEARCH_PASSWORD}"
    ssl           => true
    cacert      => "/usr/share/logstash/certs/root-ca.pem"
    index       => "suru-suricata-%{+YYYY.MM.dd}"
  }
}
