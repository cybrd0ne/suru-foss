# Pipeline: Zeek conn.log → OpenSearch (ECS v8)
# Fed via P2P pipeline input (address: zeek-pipe); no UDP listener

input {
  pipeline { address => "zeek-pipe" }
}

filter {
  mutate {
    rename => {
      "[id.orig_h]"  => "[source][ip]"
      "[id.resp_h]"  => "[destination][ip]"
      "[id.orig_p]"  => "[source][port]"
      "[id.resp_p]"  => "[destination][port]"
      "[proto]"      => "[network][transport]"
      "[conn_state]" => "[zeek][conn][state]"
      "[service]"    => "[network][protocol]"
      "[duration]"   => "[event][duration]"
      "[orig_bytes]" => "[source][bytes]"
      "[resp_bytes]" => "[destination][bytes]"
    }
    add_field => {
      "[ecs][version]"    => "8.0.0"
      "[event][dataset]"  => "zeek.conn"
      "[event][module]"   => "zeek"
      "[event][category]" => "network"
      "[observer][type]"  => "network_sensor"
    }
  }

  # SEC-012: preserve ingest time then overwrite @timestamp with Zeek event time.
  # Zeek `ts` is a Unix epoch float; UNIX format handles fractional seconds.
  mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
  date {
    match          => ["ts", "UNIX"]
    target         => "@timestamp"
    tag_on_failure => ["_dateparsefailure"]
  }
}

output {
  opensearch {
    ecs_compatibility => "v8"   # Required for OpenSearch 3.x
    hosts       => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
    user        => "${OPENSEARCH_USER}"
    password    => "${OPENSEARCH_PASSWORD}"
    ssl           => true
    cacert      => "/usr/share/logstash/certs/root-ca.pem"
    index       => "suru-zeek-%{+YYYY.MM.dd}"
  }
}
