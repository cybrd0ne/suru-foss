# Pipeline: pfsense-opnsense — pfSense/OPNsense filterlog → OpenSearch (ECS v8)
# Receives events from 00-beats-input via Logstash pipeline-to-pipeline.
# MITRE ATT&CK: TA0001/T1190 (Exploit Public-Facing Application)

input {
  pipeline { address => "pfsense-pipe" }
}

filter {
  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:[observer][hostname]} filterlog\[%{POSINT}\]: %{GREEDYDATA:[_filterlog_raw]}",
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:[observer][hostname]} %{GREEDYDATA:[_filterlog_raw]}"
      ]
    }
    tag_on_failure => ["_grok_pfsense_failure"]
  }
  if "_grok_pfsense_failure" not in [tags] {
    # SEC-050: two-pass CSV parse to handle IPv4 vs IPv6 column layout.
    # IPv4 has 6 extra header fields (tos,ecn,ttl,id,offset,flags) before
    # proto_id; IPv6 has 3 (class,flow,hoplimit) — a 3-column shift that puts
    # src_ip/dst_ip in wrong positions with a single IPv4-shaped parse.

    # Pass 1: common 9-column prefix to determine ip_version.
    csv {
      source                    => "[_filterlog_raw]"
      separator                 => ","
      autogenerate_column_names => false
      columns                   => [
        "rule_number","sub_rule","anchor","tracker","interface","reason","action","direction","ip_version"
      ]
    }

    # Pass 2: version-specific full parse.
    if [ip_version] == "4" {
      csv {
        source                    => "[_filterlog_raw]"
        separator                 => ","
        autogenerate_column_names => false
        columns                   => [
          "rule_number","sub_rule","anchor","tracker","interface","reason","action","direction","ip_version",
          "tos","ecn","ttl","id","offset","flags","proto_id","proto","length",
          "src_ip","dst_ip","src_port","dst_port","data_length","tcp_flags","sequence_number",
          "ack_number","window","urg","options"
        ]
      }
    } else if [ip_version] == "6" {
      csv {
        source                    => "[_filterlog_raw]"
        separator                 => ","
        autogenerate_column_names => false
        columns                   => [
          "rule_number","sub_rule","anchor","tracker","interface","reason","action","direction","ip_version",
          "ip6class","flow","hoplimit","proto_id","proto","length",
          "src_ip","dst_ip","src_port","dst_port","data_length"
        ]
      }
    }

    # SEC-050: ICMP rows carry no ports — proto_id 1=ICMPv4, 58=ICMPv6.
    # Move port-position fields to @metadata BEFORE the rename below so they
    # never reach integer-mapped [source][port]/[destination][port] ECS fields.
    # MITRE: TA0043/T1590 Reconnaissance (ICMP ping/scan detection)
    if [proto_id] == "1" or [proto_id] == "58" {
      mutate {
        rename => {
          "src_port" => "[@metadata][icmp_type]"
          "dst_port" => "[@metadata][icmp_code]"
        }
      }
    }

    mutate {
      rename => {
        "src_ip"    => "[source][ip]"
        "dst_ip"    => "[destination][ip]"
        "src_port"  => "[source][port]"
        "dst_port"  => "[destination][port]"
        "proto"     => "[network][transport]"
        "action"    => "[event][action]"
        "interface" => "[observer][ingress][interface][name]"
        "direction" => "[network][direction]"
      }
      add_field => {
        "[ecs][version]"     => "8.0.0"
        "[event][dataset]"   => "pfsense.filterlog"
        "[event][module]"    => "pfsense"
        "[observer][type]"   => "firewall"
        "[observer][vendor]" => "Netgate"
      }
      # syslog_timestamp removed below after date{} uses it (SEC-012).
      remove_field => ["[_filterlog_raw]", "message"]
    }

    # SEC-012: preserve ingest time then overwrite @timestamp with event time.
    # syslog_timestamp was grok-captured from the RFC 3164 BSD syslog header —
    # this is the router-local event time (BST/UTC depending on router TZ).
    # Remove syslog_timestamp after the date block so the field is available here.
    mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
    date {
      match          => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601"]
      target         => "@timestamp"
      timezone       => "UTC"
      tag_on_failure => ["_dateparsefailure"]
    }
    mutate { remove_field => ["syslog_timestamp"] }
    if [event][action] == "block" {
      mutate { add_field => { "[event][kind]" => "alert" } }
    }
  }
}

output {
  # SEC-051: route grok/date-parse failures to quarantine instead of indexing
  # malformed/unknown events in the main pfsense index.
  if "_grok_pfsense_failure" in [tags] or "_dateparsefailure" in [tags] {
    pipeline { send_to => "quarantine-pipe" }
  } else {
    opensearch {
      ecs_compatibility => "v8"
      hosts       => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
      user        => "${OPENSEARCH_USER}"
      password    => "${OPENSEARCH_PASSWORD}"
      ssl         => true
      cacert      => "/usr/share/logstash/certs/root-ca.pem"
      index       => "suru-pfsense-%{+YYYY.MM.dd}"
    }
  }
}
