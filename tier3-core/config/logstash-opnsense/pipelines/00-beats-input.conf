# Pipeline: 00-beats-input — shared Beats/syslog-ng TLS receiver (OPNsense profile)
# SURU Tier 3 ingestion gateway — all Beats traffic on port 5044 enters here.
# Events are routed to downstream pipelines via Logstash pipeline-to-pipeline (P2P).
#
# *** STANDBY PROFILE — NOT CURRENTLY DEPLOYED ***
# SEC-056: The opnsense profile is a standby profile. No OPNsense deployment exists;
# the live deployment uses ROUTER_PLATFORM=pfsense (logstash-pfsense profile).
# This profile should only be activated when an OPNsense router is deployed.
#
# Routing logic (by syslog-ng shipper tags):
#   pfblocker-ip / pfblocker-dns  → pfblocker-pipe
#   everything else               → pfsense-pipe
#
# ROUTING TAG CONTRACT (shipper-side requirement):
#   The OPNsense syslog-ng configuration MUST emit the following tags on each
#   forwarded event so this pipeline can route correctly:
#     pfblocker-ip  — pfBlockerNG IP reputation block events
#     pfblocker-dns — pfBlockerNG DNSBL block events
#   Without these tags, all pfBlockerNG events fall through to pfsense-pipe and
#   are indexed under suru-pfsense-* (wrong index, wrong schema).
#
# [STUB: opnsense routing tags must be emitted by the syslog-ng config on the
# OPNsense router — no OPNsense deployment exists yet. Implement when
# tier1-perimeter gains OPNsense support in the syslog-ng template.]

input {
  beats {
    port                        => 5044
    ssl_enabled                 => true
    ssl_certificate_authorities => ["/usr/share/logstash/certs/root-ca.pem"]
    ssl_certificate             => "/usr/share/logstash/certs/logstash.pem"
    ssl_key                     => "/usr/share/logstash/certs/logstash-key.pem"
    ssl_client_authentication   => "required"
  }
}

output {
  # SEC-056: routing tags (pfblocker-ip / pfblocker-dns) must be set by the
  # OPNsense syslog-ng shipper. If they are absent, pfBlockerNG events land
  # in pfsense-pipe and are misindexed. See ROUTING TAG CONTRACT above.
  if "pfblocker-ip" in [tags] or "pfblocker-dns" in [tags] {
    pipeline { send_to => "pfblocker-pipe" }
  } else {
    pipeline { send_to => "pfsense-pipe" }
  }
}
