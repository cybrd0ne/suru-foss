# Pipeline: pfblocker — pfBlockerNG DNSBL/IP Reputation → OpenSearch (ECS v8)
# Receives events from 00-beats-input via Logstash pipeline-to-pipeline.
# Tagged by syslog-ng Tier2 forwarder as pfblocker-ip or pfblocker-dns.
# MITRE ATT&CK: TA0042/T1583 (Acquire Infrastructure — DNS)

input {
  pipeline { address => "pfblocker-pipe" }
}

filter {
  if "pfblocker-ip" in [tags] {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp},%{IPORHOST:[destination][ip]},%{IPORHOST:[source][ip]},%{INT:[source][port]},%{INT:[destination][port]},%{WORD:[network][direction]},%{WORD:[source][geo][country_iso_code]},%{WORD:[event][dataset]},%{GREEDYDATA:[rule][name]}"
      }
      tag_on_failure => ["_grok_pfblocker_failure"]
    }
    mutate {
      add_field => {
        "[ecs][version]"   => "8.0.0"
        "[event][module]"  => "pfblockerng"
        "[event][kind]"    => "alert"
        "[event][action]"  => "block"
        "[observer][type]" => "firewall"
      }
    }

    # SEC-012: preserve ingest time then overwrite @timestamp with event time.
    # pfBlockerNG IP log carries an ISO8601 timestamp at the start of the CSV message.
    if "_grok_pfblocker_failure" not in [tags] {
      mutate { add_field => { "[event][ingested]" => "%{@timestamp}" } }
      date {
        match          => ["timestamp", "ISO8601"]
        target         => "@timestamp"
        tag_on_failure => ["_dateparsefailure"]
      }
    }
  }
}

output {
  opensearch {
    ecs_compatibility => "v8"
    hosts       => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}"]
    user        => "${OPENSEARCH_USER}"
    password    => "${OPENSEARCH_PASSWORD}"
    ssl         => true
    cacert      => "/usr/share/logstash/certs/root-ca.pem"
    index       => "suru-pfblockerng-%{+YYYY.MM.dd}"
  }
}
