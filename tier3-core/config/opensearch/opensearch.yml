# OpenSearch node configuration — SURU Datalake
# Seeded into opensearch-config volume by suru.t3.datalake.config-init.
# Cert paths are NOT set here — they are set via environment variables
# in compose.yaml (single source of truth, avoids duplication).
#
# Removed settings (cause StartupException on latest image):
#   - path.repo in this file                → set via env var in compose.yaml

cluster.name: suru-t3-datalake
node.name: opensearch-node1

# ── Paths ──────────────────────────────────────────────────────────────────────
path.data: /usr/share/opensearch/data
path.logs: /usr/share/opensearch/logs

# ── Network ───────────────────────────────────────────────────────────────────
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# ── Discovery ─────────────────────────────────────────────────────────────────
discovery.type: single-node

# ── Memory ────────────────────────────────────────────────────────────────────
bootstrap.memory_lock: true

# ── Security plugin (non-TLS settings only) ───────────────────────────────────
# TLS cert paths are set via env vars in compose.yaml — not here.
# SEC-076: false — never fall back to OpenSearch demo security config (which would
# re-introduce demo users + the own_index["*"] mapping of SEC-072). The security
# index is seeded explicitly by suru.t3.datalake.security-init running securityadmin.sh.
plugins.security.allow_default_init_securityindex: false
plugins.security.audit.type: internal_opensearch
plugins.security.enable_snapshot_restore_privilege: true
plugins.security.check_snapshot_restore_write_privileges: true

# ── Disk watermarks ───────────────────────────────────────────────────────────
cluster.routing.allocation.disk.threshold_enabled: true
cluster.routing.allocation.disk.watermark.low: "85%"
cluster.routing.allocation.disk.watermark.high: "90%"
cluster.routing.allocation.disk.watermark.flood_stage: "95%"

# ── Security — Admin and node DNs ─────────────────────────────────────────────
# These MUST be in opensearch.yml — env var override is not supported for authcz.
plugins.security.authcz.admin_dn:
  - "CN=admin,OU=SURU,O=SURU Platform,C=RO"
plugins.security.nodes_dn:
  - "CN=suru-t3-datalake-opensearch,OU=SURU,O=SURU Platform,C=RO"
