# =============================================================================
# SURU — Tier 4 Frontdoor: main nginx configuration
# =============================================================================
# Single external entry point for the SURU platform. All HTTP/HTTPS access
# from the LAN to internal containers (dashboards, grafana, prometheus,
# logstash metrics, opensearch REST) flows through the http {} server block
# below. Non-HTTP ingest (Beats over TCP, syslog over UDP) flows through the
# stream {} block.
#
# Routing rules live in config/routes.yaml and are rendered by
# scripts/render-routes.sh into config/http/*.conf (location blocks) and
# config/stream/*.conf (server blocks). This file glues them together.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

# ── HTTP / HTTPS ─────────────────────────────────────────────────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    client_max_body_size 100m;       # OSD bulk uploads / Beats payloads via /api

    # Docker embedded DNS — required so backend hostnames are resolved at
    # request time (not config-load time). Without this, the frontdoor would
    # fail to start if any backend container was not yet running.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # WebSocket upgrade map — emits "upgrade" only when the client asks for it,
    # otherwise "close". Used by the rendered location blocks.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Rate limiting — protects auth surfaces and the OpenSearch API endpoint.
    # Zone: 10 MB shared memory, 10 req/s per client IP; burst allows short spikes.
    limit_req_zone $binary_remote_addr zone=suru_auth:10m rate=10r/s;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;  # assumes FRONTDOOR_PORT=443
    }

    # ── Main HTTPS virtual host ──────────────────────────────────────────────
    # Bound to loopback only — port 443 on the host is owned by the stream
    # ssl_preread SNI demux block below. The stream server proxy_pass'es here
    # for non-syslog SNI and injects the real client IP via PROXY protocol.
    server {
        listen                  127.0.0.1:8443 ssl proxy_protocol;
        http2                   on;
        server_name             _;
        # Real client IP from the stream PROXY protocol header.
        set_real_ip_from 127.0.0.1;
        real_ip_header proxy_protocol;
        # FRONTDOOR_FQDN from .env is used for cert CN/SAN and operator-facing
        # URLs; nginx serves any Host header here since this is the sole vhost.

        ssl_certificate         /etc/nginx/certs/frontdoor.pem;
        ssl_certificate_key     /etc/nginx/certs/frontdoor-key.pem;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     1h;
        ssl_session_tickets     off;

        # Strong-default security headers — applied to every route.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options          "SAMEORIGIN" always;
        add_header X-Content-Type-Options   "nosniff" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # Liveness probe — bypasses auth so the container healthcheck can hit it.
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # Static content — served from the shared `frontdoor-content` volume
        # written by suru.t4.frontdoor.content (git-sync of the
        # cybrd0ne/suru-frontdoor-content repo). The volume is mounted
        # read-only here; the served root is `<volume>/public`. Rendered
        # location blocks (below) for explicit prefixes /dashboards/,
        # /grafana, etc. take precedence over this catch-all because nginx
        # picks the longest matching prefix.
        location / {
            auth_basic           "SURU Platform";
            auth_basic_user_file /etc/nginx/auth/htpasswd;

            root /var/www/content/public;
            index index.html;
            # On a fresh deploy the content sidecar may not have synced yet —
            # serve a placeholder rather than a hard 404 in that window.
            try_files $uri $uri/ /index.html =503;
        }

        # Rendered route blocks (location blocks) — one per http_routes entry
        # in routes.yaml. Re-render with scripts/render-routes.sh.
        include /etc/nginx/http/*.conf;
    }
}

# ── Stream (TCP / UDP) ───────────────────────────────────────────────────────
stream {
    log_format basic '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';

    # Log to stdout/stderr so Docker's json-file driver captures stream logs the
    # same way it captures the http access/error logs (the base image symlinks
    # access.log→/dev/stdout, error.log→/dev/stderr). Writing to real files under
    # the root-owned /var/log/nginx/ fails: the proxy runs as non-root uid 101
    # (SEC-030) and cannot create files there (13: Permission denied).
    access_log /dev/stdout basic;
    error_log  /dev/stderr warn;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── SNI-based demux on port 443 ─────────────────────────────────────────
    # ssl_preread reads SNI from the TLS ClientHello without terminating TLS.
    # syslog.suru.local → TCP passthrough to logstash-pfsense:5140 (mTLS)
    # default → loopback HTTPS listener (8443) with proxy_protocol for real IP
    # NOTE: this route is NOT rendered by render-routes.sh (ssl_preread cannot
    # be expressed by the flat listen/proxy_pass model). See routes.yaml.
    # SNI ingestion entries are generated at startup by entrypoint.sh from
    # FRONTDOOR_INGESTION_FQDNS and written to sni-ingestion-map.conf.
    # Each listed FQDN routes to the loopback TLS passthrough server (9443).
    # Add new ingestion collectors to FRONTDOOR_INGESTION_FQDNS in .env.
    # SNI map: ingestion FQDNs → 9443 (raw TLS passthrough, no PROXY header);
    # everything else → 9080 (HTTPS relay that injects PROXY protocol for real IP).
    map $ssl_preread_server_name $suru_443_upstream {
        hostnames;
        include /run/nginx/sni-ingestion-map.conf;
        default  127.0.0.1:9080;
    }

    # Port 443 SNI demux — NO proxy_protocol here.
    # proxy_protocol is applied only by the 9080 relay below so that syslog
    # connections routed to 9443 reach Logstash as a raw TLS stream.
    server {
        listen 443;
        listen [::]:443;
        ssl_preread        on;
        proxy_pass         $suru_443_upstream;
        proxy_timeout      300s;
        proxy_connect_timeout 5s;
    }

    # HTTPS relay — injects PROXY protocol before forwarding to the HTTP server.
    # The HTTP server at 8443 listens with proxy_protocol to recover real client IP.
    # Syslog connections bypass this server entirely (they go directly to 9443).
    server {
        listen 127.0.0.1:9080;
        proxy_pass         127.0.0.1:8443;
        proxy_protocol     on;
        proxy_timeout      300s;
        proxy_connect_timeout 5s;
    }

    # Syslog TLS passthrough — raw stream, no PROXY protocol header.
    # Logstash terminates mTLS; this server forwards the TLS stream untouched.
    # Variable proxy_pass activates the resolver above so the hostname is
    # resolved per-connection, not at nginx startup — nginx starts cleanly
    # even if logstash-pfsense is temporarily down.
    server {
        listen 127.0.0.1:9443;
        set $syslog_tls_backend suru-t3-ingestion-logstash-pfsense:5140;
        proxy_pass         $syslog_tls_backend;
        proxy_timeout      300s;
        proxy_connect_timeout 5s;
    }

    # Rendered stream blocks (server + upstream) — one per stream_routes entry
    # in routes.yaml. Re-render with scripts/render-routes.sh.
    include /etc/nginx/stream/*.conf;
}
