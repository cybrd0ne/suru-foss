# =============================================================================
# Rendered by scripts/render-routes.sh from routes.yaml — do not edit by hand.
# Route #4: Prometheus — Tier-4 metrics + alert UI
# Path: /prometheus  ->  http://suru-t4-monitoring-prometheus:9090
# =============================================================================
location = /prometheus { return 301 /prometheus/; }
location /prometheus/ {
    auth_basic           "SURU Platform";
    auth_basic_user_file /etc/nginx/auth/htpasswd;
    proxy_set_header Authorization "";  # strip after nginx validates — backend does not use HTTP Basic Auth
    limit_req zone=suru_auth burst=20 nodelay;

    set $upstream_prometheus suru-t4-monitoring-prometheus;
    proxy_pass               http://$upstream_prometheus:9090;
    proxy_http_version       1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket upgrade support (Grafana live, OSD notifications)
    # $connection_upgrade is defined in nginx.conf via a map directive.
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
