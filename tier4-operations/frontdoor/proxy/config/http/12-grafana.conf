# =============================================================================
# Rendered by scripts/render-routes.sh from routes.yaml — do not edit by hand.
# Route #3: Grafana — Tier-4 monitoring dashboards
# Path: /grafana  ->  http://suru-t4-monitoring-grafana:3000
# =============================================================================
location = /grafana { return 301 /grafana/; }
location /grafana/ {
    auth_basic           "SURU Platform";
    auth_basic_user_file /etc/nginx/auth/htpasswd;
    proxy_set_header Authorization "";  # strip after nginx validates — backend does not use HTTP Basic Auth
    limit_req zone=suru_auth burst=20 nodelay;

    set $upstream_grafana suru-t4-monitoring-grafana;
    proxy_pass               http://$upstream_grafana:3000;
    proxy_http_version       1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket upgrade support (Grafana live, OSD notifications)
    # $connection_upgrade is defined in nginx.conf via a map directive.
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
