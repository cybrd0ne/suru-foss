# =============================================================================
# Rendered by scripts/render-routes.sh from routes.yaml — do not edit by hand.
# Route #1: OpenSearch Dashboards — OSD handles its own auth (form login + session cookie)
# Path: /dashboards/  ->  https://suru-t3-datalake-dashboards:5601
# =============================================================================
location /dashboards/ {

    set $upstream_dashboards suru-t3-datalake-dashboards;
    proxy_pass               https://$upstream_dashboards:5601;
    proxy_http_version       1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket upgrade support (Grafana live, OSD notifications)
    # $connection_upgrade is defined in nginx.conf via a map directive.
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_ssl_trusted_certificate /etc/nginx/certs/root-ca.pem;
    proxy_ssl_verify       on;
    proxy_ssl_verify_depth 2;
    proxy_ssl_name         suru-t3-datalake-dashboards;
    proxy_ssl_server_name  on;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
