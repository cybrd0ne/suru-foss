# =============================================================================
# Rendered by scripts/render-routes.sh from routes.yaml — do not edit by hand.
# Route #5: OpenSearch REST API — query/index operations (OpenSearch handles its own auth)
# Path: /api/search  ->  https://suru-t3-datalake-opensearch:9200
# =============================================================================
location = /api/search { return 301 /api/search/; }
location /api/search/ {
    limit_req zone=suru_auth burst=20 nodelay;
    rewrite ^/api/search/(.*)$ /$1 break;

    set $upstream_api_search suru-t3-datalake-opensearch;
    proxy_pass               https://$upstream_api_search:9200;
    proxy_http_version       1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket upgrade support (Grafana live, OSD notifications)
    # $connection_upgrade is defined in nginx.conf via a map directive.
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_ssl_trusted_certificate /etc/nginx/certs/root-ca.pem;
    proxy_ssl_verify       on;
    proxy_ssl_verify_depth 2;
    proxy_ssl_name         suru-t3-datalake-opensearch;
    proxy_ssl_server_name  on;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
